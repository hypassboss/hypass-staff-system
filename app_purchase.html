<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HYPASS | 採購中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { background: #e2e8f0; font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; padding-bottom: 80px;}
        #app-container { background: #f1f5f9; min-height: 100vh; position: relative; overflow-x: hidden; }
        .view-panel { display: none; animation: fadeIn 0.3s ease; } .view-panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .glass-card { background: rgba(255, 255, 255, 0.98); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05); border: 1px solid rgba(255, 255, 255, 0.8); }
        .input-field { width: 100%; padding: 0.75rem 1rem; background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 0.75rem; font-size: 0.875rem; font-weight: bold; color: #1e293b; transition: all 0.2s; }
        .input-field:focus { outline: none; border-color: #0ea5e9; background: #ffffff; box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1); }
        .select-arrow { appearance: none; background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3E%3Cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3E%3C/svg%3E"); background-size: 1.2em 1.2em; background-position: right 0.5rem center; background-repeat: no-repeat; padding-right: 2rem; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        nav { display: none !important; }
        #core-bottom-nav { display: flex !important; }
        @keyframes slideInLeft { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        .toast-msg { animation: slideInLeft 0.4s ease-out forwards; }
    </style>
</head>
<body class="text-slate-800 relative">
    
    <div id="toast-container" class="fixed bottom-24 left-4 z-[9999] flex flex-col space-y-3 pointer-events-none"></div>

    <div id="loading-screen" class="fixed inset-0 bg-slate-900 z-[9999] flex flex-col items-center justify-center text-white transition-opacity duration-500">
        <div class="text-6xl mb-4 animate-bounce">🛒</div>
        <h2 class="text-xl font-black tracking-widest mb-2">HYPASS 採購中心</h2>
        <p class="text-xs font-bold text-slate-400 tracking-wider">系統載入中...</p>
    </div>

    <div id="app-container" class="max-w-md mx-auto shadow-2xl relative hidden">
        <header class="bg-amber-900 text-white px-4 py-3 shadow-md sticky top-0 z-50 flex items-center justify-between h-14 relative">
            <button id="btn-back" onclick="backToDash()" class="hidden mr-2 bg-white/10 hover:bg-white/20 px-3 py-1.5 rounded-full text-xs font-bold transition shrink-0 flex items-center">🔙 返回</button>
            <div class="flex-1 min-w-0 flex justify-center text-center">
                <h1 class="text-base sm:text-lg font-black italic tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-amber-300 to-orange-200 truncate px-2" id="header-title">採購中心大廳</h1>
            </div>
            <div class="shrink-0 text-[10px] font-bold bg-white/10 px-2 py-1 rounded-full border border-white/20" id="user-badge">載入中</div>
        </header>

        <main class="p-4 relative z-10">
            <div id="view-dashboard" class="view-panel active space-y-4">
                <div class="grid grid-cols-3 gap-3 mb-4">
                    <button onclick="openView('req-list', '請購單管理')" class="glass-card p-4 rounded-2xl flex flex-col items-center justify-center shadow-sm border border-sky-100 hover:bg-sky-50 transition active:scale-95">
                        <span class="text-3xl mb-2 drop-shadow-sm">📋</span>
                        <span class="font-black text-slate-700 text-xs tracking-widest">請購單管理</span>
                    </button>
                    <button onclick="openPOForm()" class="glass-card p-4 rounded-2xl flex flex-col items-center justify-center shadow-sm border border-amber-100 hover:bg-amber-50 transition active:scale-95">
                        <span class="text-3xl mb-2 drop-shadow-sm">✍️</span>
                        <span class="font-black text-slate-700 text-xs tracking-widest">採購單建檔</span>
                    </button>
                    <button onclick="openView('history', '採購記錄')" class="glass-card p-4 rounded-2xl flex flex-col items-center justify-center shadow-sm border border-indigo-100 hover:bg-indigo-50 transition active:scale-95">
                        <span class="text-3xl mb-2 drop-shadow-sm">📜</span>
                        <span class="font-black text-slate-700 text-xs tracking-widest">採購記錄</span>
                    </button>
                </div>

                <div class="glass-card p-5 rounded-2xl shadow-sm border-t-4 border-red-500">
                    <h3 class="font-black text-slate-800 text-sm mb-3 flex items-center justify-between">
                        <span class="flex items-center"><span class="mr-2 text-lg">🚨</span>內部請購最新狀況</span>
                        <span class="text-[9px] bg-red-100 text-red-600 px-2 py-1 rounded-md font-black shadow-sm">待處理優先</span>
                    </h3>
                    <div id="dash-req-list" class="space-y-3 max-h-48 overflow-y-auto pr-1 no-scrollbar">
                        <p class="text-xs text-slate-400 text-center py-4">掃描請購單中...</p>
                    </div>
                </div>
            </div>

            <div id="view-req-list" class="view-panel space-y-4">
                <div class="glass-card p-5 rounded-2xl shadow-sm border-t-4 border-sky-500">
                    <div class="flex justify-between items-center mb-4 border-b border-slate-100 pb-3">
                        <h3 class="font-black text-slate-800 text-lg flex items-center"><span class="mr-2 text-xl">📋</span>請購單管理</h3>
                    </div>
                    <p class="text-[10px] text-slate-500 font-bold mb-4 bg-sky-50 p-2.5 rounded-lg border border-sky-100">📌 點擊下方的請購單，即可帶入資料並轉為正式採購單。</p>
                    <div id="ui-req-full-list" class="space-y-3 max-h-[65vh] overflow-y-auto no-scrollbar pr-1 pb-10">
                        <p class="text-center text-xs text-slate-400 py-6">載入中...</p>
                    </div>
                </div>
            </div>

            <div id="view-history" class="view-panel space-y-4">
                <div class="glass-card p-4 md:p-5 rounded-[2rem] shadow-sm border-t-4 border-indigo-500 relative pb-10">
                    <div class="flex justify-between items-center mb-4 border-b border-slate-100 pb-3">
                        <h3 class="font-black text-slate-800 text-lg flex items-center"><span class="mr-2 text-xl">📜</span>採購記錄</h3>
                    </div>
                    <div id="ui-po-history-list" class="space-y-3 max-h-[65vh] overflow-y-auto no-scrollbar pr-1">
                        <p class="text-center text-xs text-slate-400 py-6">載入中...</p>
                    </div>
                </div>
            </div>

            <div id="view-po-form" class="view-panel space-y-5">
                <div class="glass-card p-5 rounded-[2rem] shadow-sm border-t-4 border-amber-500">
                    <h3 class="font-black text-slate-800 pl-1 text-lg mb-4 flex items-center justify-between">
                        <span class="flex items-center"><span class="mr-2">✍️</span>正式採購單建檔</span>
                        <span id="po-linked-req" class="hidden text-[9px] bg-sky-100 text-sky-700 px-2 py-1 rounded font-black border border-sky-200"></span>
                    </h3>
                    
                    <form onsubmit="submitPO(event)" class="space-y-4">
                        <input type="hidden" id="linked-req-id">
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 ml-1 block mb-1">選擇供應商</label>
                            <select id="po-supplier" class="input-field select-arrow" required></select>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 ml-1 block mb-1">預計/期望到貨日</label>
                            <input type="date" id="po-expected-date" class="input-field bg-white font-black text-amber-700" required>
                        </div>
                        
                        <div class="bg-slate-50 p-3 rounded-xl border border-slate-200 shadow-inner">
                            <h5 class="text-[10px] font-black text-slate-700 mb-3 flex justify-between items-center">
                                <span>📦 採購品項明細</span>
                                <button type="button" onclick="addPoItemRow()" class="bg-white border border-slate-300 text-slate-600 px-2 py-1 rounded text-[9px] shadow-sm hover:bg-slate-100">➕ 新增</button>
                            </h5>
                            <div id="po-items-container" class="space-y-2">
                                </div>
                        </div>

                        <div>
                            <label class="text-[10px] font-bold text-slate-500 ml-1 block mb-1">採購備註說明</label>
                            <textarea id="po-note" class="input-field h-24 resize-none" placeholder="例如：急件處理、特殊規格..."></textarea>
                        </div>

                        <button type="submit" id="btn-submit-po" class="w-full bg-amber-600 hover:bg-amber-700 text-white font-black py-4 rounded-2xl shadow-md active:scale-95 transition tracking-widest text-base mt-2">🚀 確認發送並建檔</button>
                    </form>
                </div>
            </div>

        </main>
    </div>

    <nav id="core-bottom-nav" class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/95 backdrop-blur-md border-t border-slate-200 flex justify-around text-[10px] font-bold text-slate-400 pb-5 pt-2 z-[9990] shadow-[0_-4px_20px_rgba(0,0,0,0.05)]">
        <div onclick="event.stopPropagation(); window.location.href='app_hr.html'" class="flex-1 flex flex-col items-center py-1 cursor-pointer transition hover:text-sky-600"><span class="text-xl mb-1 opacity-60 grayscale">👨‍💼</span><span class="scale-90">員工</span></div>
        <div onclick="event.stopPropagation(); window.location.href='app_inventory.html'" class="flex-1 flex flex-col items-center py-1 cursor-pointer transition hover:text-emerald-600"><span class="text-xl mb-1 opacity-60 grayscale">📦</span><span class="scale-90">庫存</span></div>
        <div onclick="event.stopPropagation(); window.location.href='app_purchase.html'" class="flex-1 flex flex-col items-center py-1 cursor-pointer transition text-amber-600"><span class="text-xl mb-1">🛒</span><span class="scale-90">採購</span></div>
        <div onclick="event.stopPropagation(); window.location.href='app_sales.html'" class="flex-1 flex flex-col items-center py-1 cursor-pointer transition hover:text-indigo-600"><span class="text-xl mb-1 opacity-60 grayscale">💼</span><span class="scale-90">業務</span></div>
        <div onclick="event.stopPropagation(); window.location.href='app_finance.html'" class="flex-1 flex flex-col items-center py-1 cursor-pointer transition hover:text-blue-600"><span class="text-xl mb-1 opacity-60 grayscale">💰</span><span class="scale-90">財務</span></div>
    </nav>

    <script src="shared.js"></script>
    <script>
        let allReqs = [];
        let allPOs = [];
        let suppliers = [];

        function showSysToast(msg) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast-msg bg-amber-600 text-white px-4 py-3 rounded-xl shadow-lg border border-amber-400 font-black text-sm flex items-center';
            toast.innerHTML = `<span class="mr-2 text-xl">✅</span>${msg}`;
            container.appendChild(toast);
            setTimeout(() => { 
                toast.style.animation = 'slideInLeft 0.4s ease-in reverse forwards'; 
                setTimeout(() => toast.remove(), 400); 
            }, 5000);
        }

        function getSafeArray(data) { 
            if (!data) return []; 
            if (Array.isArray(data)) return data; 
            try { 
                let parsed = (typeof data === 'string') ? JSON.parse(data) : data; 
                return Array.isArray(parsed) ? parsed : []; 
            } catch(e) { return []; } 
        }

        function openView(viewId, title) {
            document.querySelectorAll('.view-panel').forEach(el => el.classList.remove('active')); 
            document.getElementById('view-' + viewId).classList.add('active');
            document.getElementById('header-title').innerText = title; 
            if(viewId === 'dashboard') {
                document.getElementById('btn-back').classList.add('hidden');
            } else {
                document.getElementById('btn-back').classList.remove('hidden');
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function backToDash() { 
            document.querySelectorAll('.view-panel').forEach(el => el.classList.remove('active')); 
            document.getElementById('view-dashboard').classList.add('active'); 
            document.getElementById('header-title').innerText = '採購中心大廳'; 
            document.getElementById('btn-back').classList.add('hidden'); 
            loadPurchaseData();
        }

        async function bootPurchase() {
            try {
                const isAuth = await authGuard('purchase');
                if(!isAuth) return;
                
                document.getElementById('user-badge').innerText = window.currentUser?.full_name || '採購人員';
                document.getElementById('loading-screen').classList.add('opacity-0');
                setTimeout(() => { 
                    document.getElementById('loading-screen').style.display = 'none'; 
                    document.getElementById('app-container').classList.remove('hidden'); 
                }, 500);

                await loadPurchaseData();
            } catch(e) { console.error(e); }
        }

        async function loadPurchaseData() {
            try {
                const { data: sups } = await window._sb.from('suppliers').select('*');
                suppliers = sups || [];
                
                const { data: reqs } = await window._sb.from('requisitions').select('*, employees(full_name)').order('created_at', {ascending: false});
                allReqs = reqs || [];
                
                const { data: pos } = await window._sb.from('po_documents').select('*').order('created_at', {ascending: false});
                allPOs = pos || [];

                populateSupplierDropdown();
                renderDashboard();
                renderReqList();
                renderHistory();
            } catch(e) { console.error('載入失敗', e); }
        }

        function populateSupplierDropdown() {
            const sel = document.getElementById('po-supplier');
            sel.innerHTML = '<option value="" disabled selected>請選擇廠商...</option>' + suppliers.map(s => `<option value="${s.supplier_name}">${s.supplier_name}</option>`).join('');
        }

        function renderDashboard() {
            const pendingReqs = allReqs.filter(r => r.status === '待處理');
            const dashContainer = document.getElementById('dash-req-list');
            
            if(pendingReqs.length === 0) {
                dashContainer.innerHTML = '<p class="text-xs text-slate-400 text-center py-4 border border-dashed border-red-200 rounded-xl bg-white">✅ 目前沒有待處理的請購單</p>';
                return;
            }

            // 顯示最新的 3 筆待處理請購單
            dashContainer.innerHTML = pendingReqs.slice(0, 3).map(r => {
                const items = getSafeArray(r.items_json);
                const itemsStr = items.map(i => `${i.name} x${i.qty}`).join(', ');
                return `
                <div class="bg-white p-3 rounded-xl border border-red-200 shadow-sm mb-2 flex justify-between items-center hover:bg-red-50 cursor-pointer transition" onclick="convertToPO('${r.id}')">
                    <div class="flex-1 pr-2 min-w-0">
                        <div class="flex justify-between mb-1">
                            <span class="text-[10px] font-black text-red-600">${r.req_no.replace('REQ-','')}</span>
                            <span class="text-[9px] text-slate-400 font-bold">${new Date(r.created_at).toLocaleDateString('zh-TW')}</span>
                        </div>
                        <p class="text-xs font-bold text-slate-800 truncate">${itemsStr}</p>
                    </div>
                    <button class="shrink-0 bg-red-600 text-white px-2 py-1.5 rounded-lg text-[10px] font-black shadow-sm">轉採購 ➔</button>
                </div>
                `;
            }).join('');
        }

        function renderReqList() {
            const container = document.getElementById('ui-req-full-list');
            if(allReqs.length === 0) {
                container.innerHTML = '<p class="text-center text-xs text-slate-400 py-6">目前尚無請購紀錄</p>';
                return;
            }

            container.innerHTML = allReqs.map(r => {
                let stCol = r.status === '已完成' ? 'text-emerald-700 bg-emerald-100 border-emerald-200' : (r.status === '取消' ? 'text-red-600 bg-red-50 border-red-200' : (r.status === '採購中' ? 'text-sky-700 bg-sky-100 border-sky-200' : 'text-amber-700 bg-amber-100 border-amber-200'));
                let items = getSafeArray(r.items_json);
                let itemsHtml = items.map(i => `<div class="flex justify-between text-xs items-center"><span class="font-bold text-slate-700">${i.name}</span><span class="font-black text-indigo-700">${i.qty} ${i.unit}</span></div>`).join('');
                
                // 如果是待處理，顯示轉採購按鈕
                let actionBtn = r.status === '待處理' ? `<button onclick="convertToPO('${r.id}')" class="w-full mt-3 bg-sky-100 hover:bg-sky-500 hover:text-white text-sky-700 font-black py-2 rounded-lg text-xs transition border border-sky-200 shadow-sm active:scale-95">⚡ 轉為正式採購單</button>` : '';

                return `
                <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm transition-all mb-3 relative">
                    <div class="flex justify-between items-center mb-2 border-b border-slate-100 pb-2">
                        <div>
                            <span class="text-[10px] font-mono font-black text-slate-600 bg-slate-100 px-2 py-0.5 rounded shadow-sm border border-slate-200 mr-2">${r.req_no}</span>
                            <span class="text-[9px] font-black px-2 py-0.5 rounded border ${stCol} shadow-sm">${r.status}</span>
                        </div>
                        <span class="text-[9px] text-slate-400 font-bold">${new Date(r.created_at).toLocaleDateString('zh-TW')}</span>
                    </div>
                    <div class="text-xs font-black text-slate-800 mb-2 flex items-center justify-between">
                        <span>申請人: ${r.employees?.full_name||'系統'}</span>
                        <span class="text-amber-600 text-[10px]">期望到貨: ${r.expected_date||'未定'}</span>
                    </div>
                    <div class="bg-slate-50 p-2.5 rounded-xl border border-slate-200 shadow-inner space-y-1 mb-2">
                        ${itemsHtml}
                    </div>
                    ${r.note ? `<p class="text-[10px] text-slate-500 font-bold bg-amber-50 p-2 rounded-lg border border-amber-100">備註: ${r.note}</p>` : ''}
                    ${actionBtn}
                </div>`;
            }).join('');
        }

        function renderHistory() {
            const container = document.getElementById('ui-po-history-list');
            if(allPOs.length === 0) {
                container.innerHTML = '<p class="text-center text-xs text-slate-400 py-6">目前尚無採購紀錄</p>';
                return;
            }

            container.innerHTML = allPOs.map(p => {
                let stCol = p.status.includes('異常') ? 'text-red-600 bg-red-50 border-red-200 animate-pulse' : (p.status === '完成' ? 'text-emerald-700 bg-emerald-100 border-emerald-200' : 'text-amber-700 bg-amber-100 border-amber-200');
                let items = getSafeArray(p.items_json);
                let itemsStr = items.map(i => `${i.name} x${i.qty}`).join(', ');

                return `
                <div class="bg-white p-3.5 rounded-xl border border-slate-200 shadow-sm flex justify-between items-center mb-3">
                    <div class="flex-1 min-w-0 pr-2">
                        <div class="flex items-center mb-1.5">
                            <span class="text-[10px] font-mono font-black text-slate-600 bg-slate-100 px-1.5 py-0.5 rounded border border-slate-200 mr-2">${p.po_no.replace('PO-','')}</span>
                            <span class="text-[9px] font-black px-1.5 py-0.5 rounded border ${stCol}">${p.status}</span>
                        </div>
                        <div class="text-xs font-black text-slate-800 truncate">${p.supplier_name}</div>
                        <div class="text-[10px] text-slate-500 mt-0.5 truncate">${itemsStr || '無明細'}</div>
                    </div>
                    <div class="text-right shrink-0">
                        <div class="text-[9px] text-slate-400 font-bold mb-1">${new Date(p.created_at).toLocaleDateString('zh-TW')}</div>
                        <div class="text-[9px] text-sky-600 font-bold bg-sky-50 px-1.5 py-0.5 rounded border border-sky-100">預計: ${p.expected_date||'未定'}</div>
                    </div>
                </div>`;
            }).join('');
        }

        // 🌟 轉採購單核心邏輯
        function convertToPO(reqId) {
            const req = allReqs.find(x => x.id === reqId);
            if(!req) return;

            document.getElementById('linked-req-id').value = req.id;
            
            const badge = document.getElementById('po-linked-req');
            badge.innerText = `🔗 關聯: ${req.req_no.replace('REQ-','')}`;
            badge.classList.remove('hidden');

            document.getElementById('po-expected-date').value = req.expected_date || '';
            document.getElementById('po-note').value = `由內部請購單 ${req.req_no} 轉單。\n原備註: ${req.note || '無'}`;

            // 載入品項
            const container = document.getElementById('po-items-container');
            container.innerHTML = '';
            
            let items = getSafeArray(req.items_json);
            if(items.length > 0) {
                items.forEach(i => {
                    addPoItemRow(i.name, i.qty, i.unit, i.type);
                });
            } else {
                addPoItemRow();
            }

            openView('po-form', '採購單建檔');
        }

        function openPOForm() {
            document.getElementById('linked-req-id').value = '';
            document.getElementById('po-linked-req').classList.add('hidden');
            document.getElementById('po-expected-date').value = '';
            document.getElementById('po-note').value = '';
            
            const container = document.getElementById('po-items-container');
            container.innerHTML = '';
            addPoItemRow();

            openView('po-form', '採購單建檔');
        }

        function addPoItemRow(name='', qty='', unit='件', type='原料') {
            const container = document.getElementById('po-items-container');
            const row = document.createElement('div');
            row.className = 'flex space-x-2 items-center po-item-row bg-white p-2 rounded-lg border border-slate-200 shadow-sm';
            row.innerHTML = `
                <input type="text" class="pi-name w-1/2 p-2 bg-slate-50 border border-slate-200 rounded text-xs font-bold outline-none focus:border-amber-500" placeholder="品名/料號" value="${name}" required>
                <input type="number" step="any" class="pi-qty w-1/4 p-2 bg-slate-50 border border-slate-200 rounded text-xs font-black text-center outline-none focus:border-amber-500" placeholder="數量" value="${qty}" required>
                <select class="pi-unit w-1/4 p-2 bg-white border border-slate-200 rounded text-xs font-bold select-arrow outline-none focus:border-amber-500">
                    <option value="件" ${unit==='件'?'selected':''}>件</option>
                    <option value="箱" ${unit==='箱'?'selected':''}>箱</option>
                    <option value="米" ${unit==='米'?'selected':''}>米</option>
                    <option value="米平方" ${unit==='米平方'?'selected':''}>米平方</option>
                </select>
                <input type="hidden" class="pi-type" value="${type}">
                <button type="button" onclick="this.parentElement.remove()" class="text-red-500 font-black px-2 hover:bg-red-50 rounded">✕</button>
            `;
            container.appendChild(row);
        }

        async function submitPO(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-submit-po');
            btn.innerText = '處理中...'; btn.disabled = true;

            const linkedReqId = document.getElementById('linked-req-id').value;
            const supplier = document.getElementById('po-supplier').value;
            const expDate = document.getElementById('po-expected-date').value;
            const note = document.getElementById('po-note').value;

            let items = [];
            document.querySelectorAll('.po-item-row').forEach(row => {
                let name = row.querySelector('.pi-name').value;
                let qty = parseFloat(row.querySelector('.pi-qty').value);
                let unit = row.querySelector('.pi-unit').value;
                let type = row.querySelector('.pi-type').value;
                if(name && qty > 0) items.push({ name, qty, unit, type });
            });

            if(items.length === 0) {
                alert('請至少新增一項採購明細！');
                btn.innerText = '🚀 確認發送並建檔'; btn.disabled = false;
                return;
            }

            const poNo = 'PO-' + new Date().toISOString().replace(/[-:T]/g,'').slice(0,14) + Math.floor(Math.random()*100).toString().padStart(2,'0');
            
            const payload = {
                po_no: poNo,
                supplier_name: supplier,
                expected_date: expDate,
                items_json: JSON.stringify(items), // 🚨 防彈寫入
                note: note,
                status: '已發送'
            };

            try {
                // 1. 寫入正式採購單
                const { error: poErr } = await window._sb.from('po_documents').insert([payload]);
                if(poErr) throw poErr;

                // 2. 🌟 如果是從請購單轉過來的，同步更新該請購單狀態為「採購中」
                if(linkedReqId) {
                    await window._sb.from('requisitions').update({ status: '採購中' }).eq('id', linkedReqId);
                }

                showSysToast(`✅ 採購單 ${poNo} 已成功建立並發送！`);
                e.target.reset();
                backToDash();
            } catch(error) {
                alert('建檔失敗: ' + error.message);
            }
            
            btn.innerText = '🚀 確認發送並建檔'; btn.disabled = false;
        }

        window.onload = bootPurchase;
        const enforceNavObserver = new MutationObserver(() => { const oldNav = document.querySelector('nav:not(#core-bottom-nav)'); if (oldNav) oldNav.remove(); });
        enforceNavObserver.observe(document.body, { childList: true, subtree: true });
    </script>
</body>
</html>
