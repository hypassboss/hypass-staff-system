<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HYPASS | 企業入口</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { background: #f8fafc; font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; -webkit-tap-highlight-color: transparent;}
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-radius: 2rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15); border: 1px solid rgba(255, 255, 255, 0.8); }
        .input-field { width: 100%; padding: 1rem 1.25rem; background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 1rem; font-size: 1rem; font-weight: 700; color: #1e293b; transition: all 0.3s ease; }
        .input-field:focus { outline: none; border-color: #0ea5e9; background: #ffffff; box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.1); }
        .select-arrow { appearance: none; background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3E%3Cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3E%3C/svg%3E"); background-size: 1.5em 1.5em; background-position: right 1rem center; background-repeat: no-repeat; padding-right: 3rem; }
        #loading-screen { transition: opacity 0.5s ease; }
        #canvas-container { position: relative; width: 100%; height: 160px; background: #ffffff; border: 2px dashed #cbd5e1; border-radius: 1rem; overflow: hidden; }
        #signature-pad { position: absolute; top: 0; left: 0; width: 100%; height: 100%; touch-action: none; cursor: crosshair; }
        @keyframes slideInLeft { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        .toast-msg { animation: slideInLeft 0.4s ease-out forwards; }
    </style>
</head>
<body class="text-slate-800 flex items-center justify-center min-h-screen p-4 relative overflow-hidden">

    <div onclick="emergencyReset()" class="absolute top-0 right-0 bg-slate-800 text-white text-[10px] font-black px-4 py-2 rounded-bl-2xl shadow-md tracking-widest cursor-pointer active:scale-95 transition-transform z-50">
        清除快取重置
    </div>

    <div id="toast-container" class="fixed top-10 left-1/2 transform -translate-x-1/2 z-[9999] flex flex-col space-y-3 pointer-events-none w-11/12 max-w-sm"></div>

    <div id="loading-screen" class="fixed inset-0 bg-slate-900 z-[100] flex flex-col items-center justify-center text-white">
        <div class="text-6xl mb-6 animate-bounce">🛡️</div>
        <h2 class="text-2xl font-black tracking-widest mb-2">HYPASS</h2>
        <p class="text-sm font-bold text-slate-400 tracking-wider">安全驗證與連線中...</p>
        <p id="loading-error-text" class="text-xs font-bold text-red-400 mt-4 px-6 text-center"></p>
    </div>

    <div id="pending-screen" class="hidden glass-panel p-8 w-full max-w-sm text-center relative z-50">
        <div class="w-20 h-20 bg-amber-100 rounded-full flex items-center justify-center mx-auto text-4xl mb-6 shadow-inner">⏳</div>
        <h2 class="text-2xl font-black mb-3 text-slate-800">資料審核中</h2>
        <p class="text-sm font-bold text-slate-500 mb-8 leading-relaxed">您的註冊資料已送出！<br>請等待管理員開通權限後，<br>再次開啟系統即可進入。</p>
        <button onclick="emergencyReset()" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-black py-4 rounded-xl shadow-lg active:scale-95 transition text-lg tracking-widest">返回首頁</button>
    </div>

    <div id="unauthorized-screen" class="fixed inset-0 bg-slate-50 z-[9998] hidden flex-col items-center justify-center p-6 text-center">
        <div class="w-24 h-24 bg-red-100 rounded-full flex items-center justify-center text-5xl mb-6 shadow-inner">🚫</div>
        <h2 id="unauth-title" class="text-2xl font-black text-slate-800 mb-2">無權限訪問</h2>
        <p id="unauth-desc" class="text-sm font-bold text-slate-500 leading-relaxed mb-8">您的帳號目前處於未開通或停權狀態。<br>如有疑問，請聯繫系統管理員。</p>
        <button onclick="emergencyReset()" class="w-full max-w-xs bg-slate-900 text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition">重新驗證與清除快取</button>
    </div>

    <div id="login-screen" class="hidden glass-panel p-8 w-full max-w-sm relative z-40">
        <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl shadow-inner">👨‍💼</div>
        <h2 class="text-2xl font-black mb-2 text-slate-800 text-center">HYPASS 系統入口</h2>
        <p class="text-xs text-slate-500 mb-6 text-center">請輸入資料或使用 LINE 快速登入</p>
        
        <div class="space-y-4 mb-6">
            <input type="tel" id="emp-phone" placeholder="輸入手機號碼" class="input-field text-center">
            <input type="password" id="emp-id" placeholder="身分證末四碼" class="input-field text-center tracking-[0.5em]" onkeypress="if(event.key==='Enter') empLogin()">
        </div>
        
        <button onclick="empLogin()" id="btn-login" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-black py-4 rounded-xl shadow-lg active:scale-95 transition mb-4 tracking-widest">登入系統</button>
        <button onclick="triggerLiffLogin()" class="w-full bg-[#06C755] hover:bg-[#05b34c] text-white font-black py-4 rounded-xl shadow-lg active:scale-95 transition tracking-widest flex justify-center items-center">
            <span class="mr-2 text-xl">💬</span> LINE 快速登入
        </button>
    </div>

    <div id="register-screen" class="hidden w-full max-w-md mx-auto z-40 pb-10">
        <div class="text-center mb-6 pt-4">
            <h1 class="text-3xl font-black italic tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-sky-500 to-indigo-500 mb-1">HYPASS</h1>
            <p class="text-xs font-bold text-slate-500 tracking-widest uppercase">新進人員報到建檔</p>
        </div>

        <form id="reg-form" class="space-y-5" onsubmit="submitRegistration(event)">
            <div class="glass-panel p-6 shadow-sm border-t-4 border-sky-400">
                <h3 class="font-black text-slate-800 text-lg mb-4 flex items-center"><span class="mr-2 text-xl">👤</span>基本身分資料</h3>
                <div class="space-y-4">
                    <div><label class="text-[11px] font-black text-slate-500 ml-1 block mb-1 uppercase tracking-wider">真實姓名</label><input type="text" id="reg-name" class="input-field" placeholder="請輸入全名" required></div>
                    <div><label class="text-[11px] font-black text-slate-500 ml-1 block mb-1 uppercase tracking-wider">身分證字號</label><input type="text" id="reg-idnum" class="input-field uppercase" placeholder="A123456789" required></div>
                    <div><label class="text-[11px] font-black text-slate-500 ml-1 block mb-1 uppercase tracking-wider">聯絡手機</label><input type="tel" id="reg-phone" class="input-field" placeholder="09XX-XXX-XXX" required></div>
                    <div><label class="text-[11px] font-black text-slate-500 ml-1 block mb-1 uppercase tracking-wider">電子信箱 Email</label><input type="email" id="reg-email" class="input-field" placeholder="example@hypass.com" required></div>
                    <div class="bg-sky-50 p-3 rounded-xl border border-sky-100">
                        <label class="text-[11px] font-black text-sky-700 ml-1 block mb-1 uppercase tracking-wider">到職日期</label>
                        <input type="date" id="reg-onboard-date" class="input-field border-sky-200 focus:border-sky-500 font-bold" required>
                    </div>
                    <div>
                        <label class="text-[11px] font-black text-slate-500 ml-1 block mb-1 uppercase tracking-wider">通訊地址</label>
                        <div class="flex space-x-2 mb-2">
                            <select id="reg-city" class="input-field select-arrow w-1/2 p-3 text-sm" onchange="updateDistricts()" required><option value="" disabled selected>選擇縣市</option></select>
                            <select id="reg-district" class="input-field select-arrow w-1/2 p-3 text-sm" required><option value="" disabled selected>鄉鎮區</option></select>
                        </div>
                        <input type="text" id="reg-address-detail" class="input-field p-3 text-sm" placeholder="詳細地址" required>
                    </div>
                </div>
            </div>

            <div class="glass-panel p-6 shadow-sm border-t-4 border-red-400">
                <h3 class="font-black text-slate-800 text-lg mb-4 flex items-center"><span class="mr-2 text-xl">🚨</span>緊急聯絡人</h3>
                <div class="space-y-4">
                    <div>
                        <label class="text-[11px] font-black text-red-500 ml-1 block mb-1 uppercase tracking-wider">聯絡人姓名</label>
                        <input type="text" id="reg-emer-name" class="input-field border-red-100 focus:border-red-400 focus:shadow-[0_0_0_4px_rgba(248,113,113,0.1)]" placeholder="聯絡人姓名與關係" required>
                    </div>
                    <div>
                        <label class="text-[11px] font-black text-red-500 ml-1 block mb-1 uppercase tracking-wider">緊急電話</label>
                        <input type="tel" id="reg-emer-phone" class="input-field border-red-100 focus:border-red-400 focus:shadow-[0_0_0_4px_rgba(248,113,113,0.1)]" placeholder="聯絡人手機" required>
                    </div>
                </div>
            </div>

            <div class="glass-panel p-6 shadow-sm border-t-4 border-emerald-500">
                <h3 class="font-black text-slate-800 text-lg mb-4 flex items-center"><span class="mr-2 text-xl">🏦</span>撥薪帳戶資料</h3>
                <div class="space-y-4">
                    <div>
                        <select id="reg-bank-code" class="input-field select-arrow text-sm" required>
                            <option value="" disabled selected>請選擇您的銀行</option>
                            <option value="822-中國信託">822 中國信託</option><option value="804-中華郵政">804 中華郵政</option>
                            <option value="013-國泰世華">013 國泰世華</option><option value="812-台新銀行">812 台新銀行</option>
                            <option value="012-台北富邦">012 台北富邦</option><option value="004-臺灣銀行">004 臺灣銀行</option>
                        </select>
                    </div>
                    <input type="number" id="reg-bank-acc" class="input-field font-mono text-lg tracking-wider" placeholder="純數字帳號" required>
                    <input type="text" id="reg-bank-user" class="input-field" placeholder="存摺戶名" required>
                </div>
            </div>

            <div class="glass-panel p-6 shadow-sm border-t-4 border-slate-700">
                <div class="flex justify-between items-center mb-5 border-b pb-3">
                    <h3 class="font-black text-slate-800 text-lg flex items-center"><span class="mr-2 text-xl">⚖️</span>勞動契約</h3>
                    <span id="contract-version-badge" class="text-[10px] bg-slate-800 text-white px-2 py-0.5 rounded font-black">載入中</span>
                </div>
                <div id="dynamic-contract-content" class="bg-slate-50 p-4 rounded-xl border text-[11px] text-slate-700 mb-6 h-64 overflow-y-auto shadow-inner">
                    <p class="text-center font-bold text-slate-400 py-10">資料連線中...</p>
                </div>
                <div class="mb-4">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest">數位簽名區</span>
                        <button type="button" onclick="clearSignature()" class="text-[10px] bg-slate-200 text-slate-600 px-3 py-1.5 rounded-lg font-bold">清除</button>
                    </div>
                    <div id="canvas-container"><canvas id="signature-pad"></canvas></div>
                </div>
                <label class="flex items-start space-x-3 cursor-pointer bg-slate-50 p-3 rounded-xl border border-slate-200 mb-6 shadow-sm">
                    <input type="checkbox" id="reg-agree" class="w-5 h-5 mt-0.5 accent-slate-900" required>
                    <span class="text-xs font-bold text-slate-700 leading-relaxed">本人已詳細閱讀並完全同意上述聘僱合約，並確認數位簽章具備法律效力。</span>
                </label>
                <button type="submit" id="btn-submit-reg" class="w-full bg-slate-900 text-white font-black py-4 rounded-xl shadow-lg active:scale-95 transition text-lg tracking-widest">確認送出並建檔</button>
            </div>
        </form>
    </div>

    <script src="shared.js?v=1005"></script>
    <script>
        let sigCanvas, sigCtx, isDrawing = false;
        let globalLineId = "";
        let currentContractVersion = "V1.0";

        const twCounties = {
            "台北市": ["中正區", "大同區", "中山區", "松山區", "大安區", "萬華區", "信義區", "士林區", "北投區", "內湖區", "南港區", "文山區"],
            "新北市": ["板橋區", "汐止區", "深坑區", "石碇區", "瑞芳區", "新店區", "中和區", "土城區", "三峽區", "樹林區", "鶯歌區", "三重區", "新莊區", "泰山區", "林口區", "蘆洲區", "五股區", "八里區", "淡水區"],
            "桃園市": ["桃園區", "中壢區", "平鎮區", "八德區", "楊梅區", "蘆竹區", "大溪區", "龍潭區", "龜山區", "大園區", "觀音區", "新屋區"],
            "台中市": ["中區", "東區", "南區", "西區", "北區", "北屯區", "西屯區", "南屯區", "太平區", "大里區", "霧峰區", "烏日區", "豐原區", "后里區", "石岡區", "東勢區", "和平區", "新社區", "潭子區", "大雅區", "神岡區", "大肚區", "沙鹿區", "龍井區", "梧棲區", "清水區", "大甲區"],
            "台南市": ["中西區", "東區", "南區", "北區", "安平區", "安南區", "永康區", "歸仁區", "新化區", "玉井區", "仁德區", "關廟區", "麻豆區", "佳里區", "新營區", "善化區", "新市區"],
            "高雄市": ["楠梓區", "左營區", "鼓山區", "三民區", "鹽埕區", "前金區", "新興區", "苓雅區", "前鎮區", "旗津區", "小港區", "鳳山區", "林園區", "大寮區", "大樹區", "大社區", "仁武區", "鳥松區", "岡山區", "橋頭區", "燕巢區", "路竹區"]
        };

        function populateCities() { const citySelect = document.getElementById('reg-city'); for (let city in twCounties) { citySelect.innerHTML += `<option value="${city}">${city}</option>`; } }
        function updateDistricts() { const city = document.getElementById('reg-city').value; const distSelect = document.getElementById('reg-district'); distSelect.innerHTML = '<option value="" disabled selected>鄉鎮區</option>'; if(twCounties[city]) { twCounties[city].forEach(d => { distSelect.innerHTML += `<option value="${d}">${d}</option>`; }); } }

        function showSysToast(msg) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast-msg bg-slate-900 text-white px-5 py-4 rounded-2xl shadow-2xl border border-slate-700 font-black text-sm flex items-center justify-center tracking-wider text-center';
            toast.innerHTML = msg; container.appendChild(toast);
            setTimeout(() => { toast.style.animation = 'slideInLeft 0.4s ease-in reverse forwards'; setTimeout(() => toast.remove(), 400); }, 3000);
        }

        function emergencyReset() { localStorage.clear(); sessionStorage.clear(); window.location.href = 'index.html'; }

        // 🌟 手動輸入身分登入機制 (電腦版專用救援)
        async function empLogin() {
            const phoneInput = document.getElementById('emp-phone').value.trim();
            const idNumInput = document.getElementById('emp-id').value.trim();
            if(!phoneInput || !idNumInput) { showSysToast('⚠️ 請輸入完整的手機號碼與密碼'); return; }

            const btn = document.getElementById('btn-login');
            btn.innerHTML = '<span class="animate-pulse tracking-widest">驗證中...</span>'; btn.disabled = true;

            try {
                const { data, error } = await window._sb.from('employees').select('*').eq('phone', phoneInput).single();
                if(error || !data) { showSysToast('❌ 找不到此資料'); resetBtn(btn); return; }
                if(data.employment_status !== '在職' || !data.is_approved) { showSysToast('🚨 帳號未開通或已停權'); resetBtn(btn); return; }
                
                const idLast4 = data.id_number ? data.id_number.slice(-4) : '';
                if(idNumInput !== idLast4 && idNumInput !== data.id_number) { showSysToast('❌ 密碼錯誤'); resetBtn(btn); return; }

                localStorage.setItem('hypass_emp_id', data.id);
                localStorage.setItem('hypass_emp_name', data.full_name);
                showSysToast('✅ 驗證成功，進入系統...');
                btn.innerHTML = '✔️ 登入成功'; btn.classList.add('bg-emerald-600');
                
                // 🌟 強制跳轉至員工大廳
                setTimeout(() => { window.location.href = 'app_hr.html'; }, 800);
            } catch(e) { showSysToast('⚠️ 連線異常'); resetBtn(btn); }
        }

        function resetBtn(btn) { btn.innerHTML = '登入系統'; btn.disabled = false; }

        function triggerLiffLogin() {
            if (!liff.isLoggedIn()) {
                liff.login({ redirectUri: window.location.href });
            } else {
                window.location.reload();
            }
        }

        async function initApp() {
            populateCities();
            let loopCount = parseInt(sessionStorage.getItem('hypass_loop_guard') || '0');
            if (loopCount >= 2) {
                sessionStorage.removeItem('hypass_loop_guard'); localStorage.removeItem('hypass_emp_id');
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('unauthorized-screen').classList.remove('hidden');
                document.getElementById('unauthorized-screen').classList.add('flex');
                document.getElementById('unauth-title').innerText = '系統已攔截異常';
                document.getElementById('unauth-desc').innerHTML = '偵測到權限異常跳轉迴圈。<br>已安全阻斷並清除快取。<br>請點擊下方按鈕重新驗證。';
                return; 
            }

            try {
                if(!window._sb) throw new Error("Supabase 未初始化");
                
                await liff.init({ liffId: "2009148826-RoogHmxk" });
                
                // 判斷是否已登入 LINE，如果沒有，電腦版會直接顯示「手動登入畫面」
                if (!liff.isLoggedIn()) { 
                    document.getElementById('loading-screen').style.display = 'none';
                    document.getElementById('login-screen').classList.remove('hidden');
                    return; 
                }
                
                const profile = await liff.getProfile();
                globalLineId = profile.userId;

                const { data: user, error } = await window._sb.from('employees').select('*').eq('line_id', globalLineId).single();
                
                document.getElementById('loading-screen').style.display = 'none';

                if (user) {
                    localStorage.setItem('hypass_emp_id', user.id);
                    localStorage.setItem('hypass_emp_name', user.full_name);
                    if (user.is_approved && user.employment_status === '在職') {
                        sessionStorage.setItem('hypass_loop_guard', loopCount + 1);
                        setTimeout(() => { sessionStorage.removeItem('hypass_loop_guard'); }, 3000);
                        // 🌟 一律強制進入員工大廳，不分流
                        window.location.href = 'app_hr.html';
                    } else if (user.employment_status === '離職') {
                        document.getElementById('unauthorized-screen').classList.remove('hidden');
                        document.getElementById('unauthorized-screen').classList.add('flex');
                    } else {
                        document.getElementById('pending-screen').classList.remove('hidden');
                    }
                } else {
                    document.getElementById('register-screen').classList.remove('hidden');
                    initSignaturePad();
                    fetchLatestContract();
                }
            } catch (err) { 
                // 若 LINE LIFF 初始化失敗，則顯示手動登入畫面
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('login-screen').classList.remove('hidden');
            }
        }

        function initSignaturePad() {
            sigCanvas = document.getElementById('signature-pad');
            if(!sigCanvas) return;
            sigCtx = sigCanvas.getContext('2d');
            sigCanvas.width = sigCanvas.offsetWidth;
            sigCanvas.height = sigCanvas.offsetHeight;
            sigCtx.lineWidth = 3; sigCtx.strokeStyle = '#0f172a';
            const start = (e) => { isDrawing = true; draw(e); };
            const end = () => { isDrawing = false; sigCtx.beginPath(); };
            const draw = (e) => {
                if(!isDrawing) return; e.preventDefault();
                let x = e.clientX || (e.touches && e.touches[0].clientX);
                let y = e.clientY || (e.touches && e.touches[0].clientY);
                let rect = sigCanvas.getBoundingClientRect();
                sigCtx.lineTo(x - rect.left, y - rect.top); sigCtx.stroke();
                sigCtx.beginPath(); sigCtx.moveTo(x - rect.left, y - rect.top);
            };
            sigCanvas.addEventListener('mousedown', start); sigCanvas.addEventListener('mouseup', end); sigCanvas.addEventListener('mousemove', draw);
            sigCanvas.addEventListener('touchstart', start, {passive:false}); sigCanvas.addEventListener('touchend', end); sigCanvas.addEventListener('touchmove', draw, {passive:false});
        }

        async function fetchLatestContract() {
            const { data } = await window._sb.from('company_forms').select('*').eq('form_type', 'employment_contract').single();
            if(data) {
                currentContractVersion = data.form_version;
                document.getElementById('contract-version-badge').innerText = data.form_version;
                document.getElementById('dynamic-contract-content').innerHTML = data.content;
            }
        }

        async function submitRegistration(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-submit-reg');
            btn.disabled = true; btn.innerText = '處理中...';
            const payload = {
                line_id: globalLineId, full_name: document.getElementById('reg-name').value,
                id_number: document.getElementById('reg-idnum').value.toUpperCase(),
                phone: document.getElementById('reg-phone').value,
                address: document.getElementById('reg-city').value + document.getElementById('reg-district').value + document.getElementById('reg-address-detail').value,
                bank_code: document.getElementById('reg-bank-code').value.split('-')[0],
                bank_name: document.getElementById('reg-bank-code').value.split('-')[1] || '',
                bank_account: document.getElementById('reg-bank-acc').value,
                bank_user_name: document.getElementById('reg-bank-user').value,
                onboarding_date: document.getElementById('reg-onboard-date').value,
                signature_data: sigCanvas.toDataURL("image/png"),
                signed_contract_version: currentContractVersion,
                employment_status: '在職', is_approved: false
            };
            const { error } = await window._sb.from('employees').insert([payload]);
            if (!error) {
                document.getElementById('register-screen').classList.add('hidden');
                document.getElementById('pending-screen').classList.remove('hidden');
            } else { alert('註冊失敗：' + error.message); btn.disabled = false; btn.innerText = '確認送出並建檔';}
        }

        window.onload = initApp;
    </script>
</body>
</html>
