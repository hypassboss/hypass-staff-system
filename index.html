<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HYPASS | 企業專屬 ERP 系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { 
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 0;
        }
        .glass-card { 
            background: rgba(255, 255, 255, 0.95); 
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.1), 0 10px 20px -5px rgba(0, 0, 0, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.8); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .input-field {
            width: 100%;
            padding: 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            font-size: 0.875rem;
            font-weight: 900;
            text-align: center;
            outline: none;
            transition: all 0.3s ease;
            background: #f8fafc;
            color: #1e293b;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }
        .input-field:focus {
            border-color: #0ea5e9;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.1), inset 0 2px 4px rgba(0,0,0,0.02);
        }
        .input-field::placeholder {
            color: #94a3b8;
            font-weight: bold;
            letter-spacing: 2px;
        }
        @keyframes slideInLeft { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        .toast-msg { animation: slideInLeft 0.4s ease-out forwards; }
        
        /* 背景裝飾元素 */
        .bg-shape-1 { position: absolute; top: -10%; left: -10%; width: 300px; height: 300px; background: radial-gradient(circle, rgba(14,165,233,0.1) 0%, rgba(255,255,255,0) 70%); border-radius: 50%; z-index: 0; pointer-events: none;}
        .bg-shape-2 { position: absolute; bottom: -10%; right: -10%; width: 400px; height: 400px; background: radial-gradient(circle, rgba(16,185,129,0.08) 0%, rgba(255,255,255,0) 70%); border-radius: 50%; z-index: 0; pointer-events: none;}
    </style>
</head>
<body class="text-slate-800 relative overflow-hidden">

    <div class="bg-shape-1"></div>
    <div class="bg-shape-2"></div>

    <div id="toast-container" class="fixed top-10 left-1/2 transform -translate-x-1/2 z-[9999] flex flex-col space-y-3 pointer-events-none w-11/12 max-w-sm"></div>

    <div class="glass-card p-8 w-full max-w-sm mx-5 md:mx-auto rounded-[2.5rem] relative overflow-hidden z-10">
        <div onclick="emergencyReset()" class="absolute top-0 right-0 bg-gradient-to-l from-sky-600 to-blue-500 text-white text-[10px] font-black px-4 py-1.5 rounded-bl-2xl shadow-sm tracking-widest cursor-pointer active:scale-95 transition-transform" title="點擊清除系統快取">
            ERP PORTAL
        </div>

        <div class="w-20 h-20 bg-gradient-to-br from-slate-50 to-slate-100 rounded-full flex items-center justify-center mx-auto mb-5 text-4xl shadow-[inset_0_2px_10px_rgba(0,0,0,0.05),0_5px_15px_rgba(0,0,0,0.05)] border border-white">
            👨‍💼
        </div>
        
        <h2 class="text-2xl font-black mb-1 text-slate-800 text-center tracking-wider">HYPASS 系統入口</h2>
        <p class="text-[11px] text-slate-500 font-bold mb-8 text-center tracking-widest">請輸入您的專屬資料進行身分驗證</p>
        
        <div class="space-y-4 mb-8">
            <div>
                <input type="tel" id="emp-phone" placeholder="輸入手機號碼" class="input-field" autocomplete="tel">
            </div>
            <div>
                <input type="password" id="emp-id" placeholder="身分證末四碼" class="input-field tracking-[0.5em]" onkeypress="if(event.key==='Enter') empLogin()">
            </div>
        </div>

        <button onclick="empLogin()" id="btn-login" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition-all tracking-widest text-base flex justify-center items-center group">
            <span class="mr-2 text-xl group-hover:translate-x-1 transition-transform">🚀</span> 登入企業系統
        </button>

        <button onclick="liffLogin()" class="w-full bg-[#06C755] hover:bg-[#05b34c] text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition-all tracking-widest text-sm flex justify-center items-center mt-4 border border-[#05b34c]">
            <span class="mr-2 text-xl">💬</span> LINE 快速登入
        </button>

        <div class="mt-8 text-center border-t border-slate-100 pt-4">
            <p class="text-[9px] font-bold text-slate-400 tracking-widest">© 2026 HYPASS ERP SYSTEM. ALL RIGHTS RESERVED.</p>
        </div>
    </div>

    <script src="shared.js"></script>
    <script>
        function showSysToast(msg) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast-msg bg-slate-900 text-white px-5 py-4 rounded-2xl shadow-2xl border border-slate-700 font-black text-sm flex items-center justify-center tracking-wider text-center';
            toast.innerHTML = msg;
            container.appendChild(toast);
            setTimeout(() => { 
                toast.style.animation = 'slideInLeft 0.4s ease-in reverse forwards'; 
                setTimeout(() => toast.remove(), 400); 
            }, 3000);
        }

        // 🌟 緊急強制重置系統快取 (破解當機死迴圈)
        function emergencyReset() {
            localStorage.clear();
            sessionStorage.clear();
            showSysToast('🧹 系統快取已強制清除！即將重新載入...');
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1500);
        }

        async function empLogin() {
            const phoneInput = document.getElementById('emp-phone').value.trim();
            const idNumInput = document.getElementById('emp-id').value.trim();
            
            if(!phoneInput || !idNumInput) { 
                showSysToast('⚠️ 請輸入完整的手機號碼與密碼'); 
                return; 
            }

            const btn = document.getElementById('btn-login');
            btn.innerHTML = '<span class="animate-pulse tracking-widest">驗證中...</span>'; 
            btn.disabled = true;
            btn.classList.add('opacity-80');

            try {
                // 檢查是否已正確載入 shared.js 的 Supabase 連線
                if (!window._sb) {
                    throw new Error('系統連線模組尚未就緒，請重新整理網頁。');
                }

                // 查詢資料庫
                const { data, error } = await window._sb.from('employees')
                    .select('*')
                    .eq('phone', phoneInput)
                    .single();

                if(error || !data) {
                    showSysToast('❌ 找不到此手機號碼的員工資料');
                    resetBtn(btn);
                    return;
                }

                if(data.employment_status !== '在職') {
                    showSysToast('🚨 該帳號目前非在職狀態，無法登入');
                    resetBtn(btn);
                    return;
                }

                // 驗證密碼: 身分證末四碼 (防呆：若輸入完整身分證也算對)
                const idLast4 = data.id_number ? data.id_number.slice(-4) : '';
                if(idNumInput !== idLast4 && idNumInput !== data.id_number) {
                    showSysToast('❌ 密碼 (身分證末四碼) 錯誤');
                    resetBtn(btn);
                    return;
                }

                // 🌟 登入成功：寫入 LocalStorage 並準備跳轉
                localStorage.setItem('hypass_emp_id', data.id);
                localStorage.setItem('hypass_emp_name', data.full_name);
                
                // 重置防死迴圈計數器
                sessionStorage.removeItem('jump_guard');
                
                showSysToast('✅ 身分驗證成功，正在進入系統...');
                
                // 動態按鈕回饋
                btn.innerHTML = '✔️ 登入成功';
                btn.classList.remove('bg-slate-900', 'hover:bg-slate-800');
                btn.classList.add('bg-emerald-600');
                
                // 1 秒後跳轉至員工大廳
                setTimeout(() => { 
                    window.location.href = 'app_hr.html'; 
                }, 1000);

            } catch(e) {
                console.error("Login Error: ", e);
                showSysToast('⚠️ 系統連線異常，請檢查網路狀態');
                resetBtn(btn);
            }
        }

        function resetBtn(btn) {
            btn.innerHTML = '<span class="mr-2 text-xl group-hover:translate-x-1 transition-transform">🚀</span> 登入企業系統'; 
            btn.disabled = false;
            btn.classList.remove('opacity-80');
        }

        // 預留給未來的 LINE LIFF 登入串接
        async function liffLogin() {
            showSysToast('⏳ LINE 登入模組載入中...');
            setTimeout(() => {
                showSysToast('⚠️ 尚未綁定 LINE 帳號，請先使用手機號碼登入。');
            }, 1500);
        }

        window.onload = () => {
            // 🌟 判斷是否已登入，加入「死迴圈安全鎖」防止不斷來回跳轉當機
            if(localStorage.getItem('hypass_emp_id')) {
                let jumps = parseInt(sessionStorage.getItem('jump_guard') || '0');
                if (jumps > 3) {
                    // 若跳轉超過 3 次，判定為死迴圈，強制清空登入狀態並留在此頁
                    sessionStorage.removeItem('jump_guard');
                    localStorage.removeItem('hypass_emp_id');
                    localStorage.removeItem('hypass_emp_name');
                    showSysToast('⚠️ 偵測到登入狀態衝突，已為您安全重置，請重新輸入資料。');
                } else {
                    // 記錄跳轉次數並放行
                    sessionStorage.setItem('jump_guard', jumps + 1);
                    window.location.href = 'app_hr.html';
                }
            }
        };
    </script>
</body>
</html>
