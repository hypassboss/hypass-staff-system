<!DOCTYPE html>
<html lang="zh-TW">

    <style>

        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-radius: 2rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15); border: 1px solid rgba(255, 255, 255, 0.8); }
        .input-field { width: 100%; padding: 1rem 1.25rem; background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 1rem; font-size: 1rem; font-weight: 700; color: #1e293b; transition: all 0.3s ease; }
        .input-field:focus { outline: none; border-color: #0ea5e9; background: #ffffff; box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.1); }
        .select-arrow { appearance: none; background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3E%3Cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3E%3C/svg%3E"); background-size: 1.5em 1.5em; background-position: right 1rem center; background-repeat: no-repeat; padding-right: 3rem; }
        #loading-screen { transition: opacity 0.5s ease; }
        #canvas-container { position: relative; width: 100%; height: 160px; background: #ffffff; border: 2px dashed #cbd5e1; border-radius: 1rem; overflow: hidden; }
        #signature-pad { position: absolute; top: 0; left: 0; width: 100%; height: 100%; touch-action: none; cursor: crosshair; }
    </style>
</head>
<body class="text-slate-800 flex items-center justify-center min-h-screen p-4">

    <div id="loading-screen" class="fixed inset-0 bg-slate-900 z-[100] flex flex-col items-center justify-center text-white">
        <div class="text-6xl mb-6 animate-bounce">🛡️</div>
        <h2 class="text-2xl font-black tracking-widest mb-2">HYPASS</h2>
        <p class="text-sm font-bold text-slate-400 tracking-wider">安全驗證與連線中...</p>
        <p id="loading-error-text" class="text-xs font-bold text-red-400 mt-4 px-6 text-center"></p>
    </div>

    <div id="pending-screen" class="hidden glass-panel p-8 w-full max-w-sm text-center relative overflow-hidden z-50">
        <div class="w-20 h-20 bg-amber-100 rounded-full flex items-center justify-center mx-auto text-4xl mb-6 shadow-inner">⏳</div>
        <h2 class="text-2xl font-black mb-3 text-slate-800">資料審核中</h2>
        <p class="text-sm font-bold text-slate-500 mb-8 leading-relaxed">您的註冊資料已送出！<br>請等待管理員開通權限後，<br>再次開啟此畫面即可進入系統。</p>
        <button onclick="liff.closeWindow()" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-black py-4 rounded-xl shadow-lg active:scale-95 transition text-lg tracking-widest">關閉視窗</button>
    </div>

    <div id="unauthorized-screen" class="fixed inset-0 bg-slate-50 z-[9998] hidden flex-col items-center justify-center p-6 text-center">
        <div class="w-24 h-24 bg-red-100 rounded-full flex items-center justify-center text-5xl mb-6 shadow-inner">🚫</div>
        <h2 class="text-2xl font-black text-slate-800 mb-2">無權限訪問</h2>
        <p class="text-sm font-bold text-slate-500 leading-relaxed mb-8">您的帳號目前處於未開通或停權狀態。<br>如有疑問，請聯繫系統管理員。</p>
        <button onclick="liff.closeWindow()" class="w-full max-w-xs bg-slate-900 text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition">關閉視窗</button>
    </div>

    <div id="register-screen" class="hidden w-full max-w-md mx-auto z-40 pb-10">
        <div class="text-center mb-6 pt-4">
            <h1 class="text-3xl font-black italic tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-sky-500 to-indigo-500 mb-1">HYPASS</h1>
            <p class="text-xs font-bold text-slate-500 tracking-widest uppercase">新進人員報到建檔</p>
        </div>

        <form id="reg-form" class="space-y-5" onsubmit="submitRegistration(event)">
            
            <div class="glass-panel p-6 shadow-sm border-t-4 border-sky-400">
                <h3 class="font-black text-slate-800 text-lg mb-4 flex items-center"><span class="mr-2 text-xl">👤</span>基本身分資料</h3>
                <div class="space-y-4">
                    <div>
                        <label class="text-[11px] font-black text-slate-500 ml-1 block mb-1 uppercase tracking-wider">真實姓名</label>
                        <input type="text" id="reg-name" class="input-field" placeholder="請輸入全名" required>
                    </div>
                    <div>
                        <label class="text-[11px] font-black text-slate-500 ml-1 block mb-1 uppercase tracking-wider">身分證字號</label>
                        <input type="text" id="reg-idnum" class="input-field uppercase" placeholder="A123456789" required>
                    </div>
                    <div>
                        <label class="text-[11px] font-black text-slate-500 ml-1 block mb-1 uppercase tracking-wider">聯絡手機</label>
                        <input type="tel" id="reg-phone" class="input-field" placeholder="09XX-XXX-XXX" required>
                    </div>
                    <div>
                        <label class="text-[11px] font-black text-slate-500 ml-1 block mb-1 uppercase tracking-wider">電子信箱 Email</label>
                        <input type="email" id="reg-email" class="input-field" placeholder="example@hypass.com" required>
                    </div>
                    <div class="bg-sky-50 p-3 rounded-xl border border-sky-100">
                        <label class="text-[11px] font-black text-sky-700 ml-1 block mb-1 uppercase tracking-wider">到職日期 (舊員工請填原到職日)</label>
                        <input type="date" id="reg-onboard-date" class="input-field border-sky-200 focus:border-sky-500 font-bold" required>
                    </div>
                    <div>
                        <label class="text-[11px] font-black text-slate-500 ml-1 block mb-1 uppercase tracking-wider">通訊地址</label>
                        <div class="flex space-x-2 mb-2">
                            <select id="reg-city" class="input-field select-arrow w-1/2 p-3 text-sm" onchange="updateDistricts()" required>
                                <option value="" disabled selected>選擇縣市</option>
                            </select>
                            <select id="reg-district" class="input-field select-arrow w-1/2 p-3 text-sm" required>
                                <option value="" disabled selected>鄉鎮市區</option>
                            </select>
                        </div>
                        <input type="text" id="reg-address-detail" class="input-field p-3 text-sm" placeholder="詳細地址 (如: 某路某段某號)" required>
                    </div>
                </div>
            </div>

            <div class="glass-panel p-6 shadow-sm border-t-4 border-red-400">
                <h3 class="font-black text-slate-800 text-lg mb-4 flex items-center"><span class="mr-2 text-xl">🚨</span>緊急聯絡人</h3>
                <div class="space-y-4">
                    <div>
                        <label class="text-[11px] font-black text-red-500 ml-1 block mb-1 uppercase tracking-wider">聯絡人姓名</label>
                        <input type="text" id="reg-emer-name" class="input-field border-red-100 focus:border-red-400 focus:shadow-[0_0_0_4px_rgba(248,113,113,0.1)]" placeholder="聯絡人姓名與關係" required>
                    </div>
                    <div>
                        <label class="text-[11px] font-black text-red-500 ml-1 block mb-1 uppercase tracking-wider">緊急電話</label>
                        <input type="tel" id="reg-emer-phone" class="input-field border-red-100 focus:border-red-400 focus:shadow-[0_0_0_4px_rgba(248,113,113,0.1)]" placeholder="聯絡人手機" required>
                    </div>
                </div>
            </div>

            <div class="glass-panel p-6 shadow-sm border-t-4 border-emerald-500">

                <div class="space-y-4">

                            <option value="007-第一銀行">007 第一銀行</option>

                            <option value="011-上海銀行">011 上海銀行</option>
                            <option value="012-台北富邦">012 台北富邦</option>
                            <option value="013-國泰世華">013 國泰世華</option>
                            <option value="016-高雄銀行">016 高雄銀行</option>
                            <option value="017-兆豐銀行">017 兆豐銀行</option>
                            <option value="050-臺灣企銀">050 臺灣企銀</option>
                            <option value="052-渣打銀行">052 渣打銀行</option>
                            <option value="053-台中銀行">053 台中銀行</option>
                            <option value="054-京城銀行">054 京城銀行</option>
                            <option value="081-匯豐銀行">081 匯豐銀行</option>

                            <option value="103-新光銀行">103 新光銀行</option>
                            <option value="108-陽信銀行">108 陽信銀行</option>
                            <option value="118-板信銀行">118 板信銀行</option>
                            <option value="147-三信銀行">147 三信銀行</option>

                            <option value="804-中華郵政">804 中華郵政(郵局)</option>
                            <option value="805-遠東銀行">805 遠東銀行</option>
                            <option value="806-元大銀行">806 元大銀行</option>
                            <option value="807-永豐銀行">807 永豐銀行</option>

                            <option value="810-星展銀行">810 星展銀行</option>
                            <option value="812-台新銀行">812 台新銀行</option>
                            <option value="816-安泰銀行">816 安泰銀行</option>
                            <option value="822-中國信託">822 中國信託</option>

                            <option value="399-農漁會信用部">399 台灣各地農漁會</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[11px] font-black text-slate-500 ml-1 block mb-1 uppercase tracking-wider">銀行帳號</label>
                        <input type="number" id="reg-bank-acc" class="input-field font-mono text-lg tracking-wider" placeholder="請輸入純數字帳號" required>
                    </div>
                    <div>

                        <input type="text" id="reg-bank-user" class="input-field" placeholder="須與身分證姓名相符" required>
                    </div>
                </div>
            </div>

            <div class="glass-panel p-6 shadow-sm border-t-4 border-slate-700">
                <div class="flex justify-between items-end border-b border-slate-100 pb-3 mb-5">
                    <h3 class="font-black text-slate-800 text-lg flex items-center"><span class="mr-2 text-xl">⚖️</span>勞動契約與規章</h3>
                    <span id="contract-version-badge" class="text-[10px] bg-slate-800 text-white px-2 py-0.5 rounded font-black shadow-sm tracking-widest">載入中</span>
                </div>
                
                <div id="dynamic-contract-content" class="space-y-4 bg-slate-50 p-4 rounded-xl border border-slate-200 text-[11px] text-slate-700 leading-relaxed text-justify mb-6 h-64 overflow-y-auto shadow-inner">
                    <p class="text-center font-bold text-slate-400 py-10">資料連線中...</p>
                </div>

                <div class="mb-4">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest">數位簽名區</span>
                        <button type="button" onclick="clearSignature()" class="text-[10px] bg-slate-200 text-slate-600 px-3 py-1.5 rounded-lg font-bold hover:bg-slate-300 transition">清除重簽</button>
                    </div>
                    <div id="canvas-container">
                        <canvas id="signature-pad"></canvas>
                    </div>
                </div>

                <label class="flex items-start space-x-3 cursor-pointer bg-slate-50 p-3 rounded-xl border border-slate-200 mb-6 shadow-sm">
                    <input type="checkbox" id="reg-agree" class="w-5 h-5 mt-0.5 accent-slate-900" required>

                </label>

                <button type="submit" id="btn-submit-reg" class="w-full bg-gradient-to-r from-slate-900 to-slate-800 text-white font-black py-4 rounded-xl shadow-lg active:scale-95 transition text-lg tracking-widest">確認送出並建檔</button>
            </div>
        </form>
    </div>

        function populateCities() {
            const citySelect = document.getElementById('reg-city');
            for (let city in twCounties) {
                citySelect.innerHTML += `<option value="${city}">${city}</option>`;
            }
        }

        function updateDistricts() {
            const city = document.getElementById('reg-city').value;
            const distSelect = document.getElementById('reg-district');
            distSelect.innerHTML = '<option value="" disabled selected>鄉鎮市區</option>';
            if(twCounties[city]) {
                twCounties[city].forEach(d => {
                    distSelect.innerHTML += `<option value="${d}">${d}</option>`;
                });
            }
        }

        function initSignaturePad() {
            sigCanvas = document.getElementById('signature-pad');
            if(!sigCanvas) return;
            sigCtx = sigCanvas.getContext('2d');
            
            sigCanvas.width = sigCanvas.offsetWidth;
            sigCanvas.height = sigCanvas.offsetHeight;
            sigCtx.lineWidth = 3;
            sigCtx.lineCap = 'round';
            sigCtx.strokeStyle = '#0f172a';

            const startPos = (e) => { isDrawing = true; draw(e); };
            const endPos = () => { isDrawing = false; sigCtx.beginPath(); };
            const draw = (e) => {
                if(!isDrawing) return;
                e.preventDefault();
                let x = e.clientX || (e.touches && e.touches[0].clientX);
                let y = e.clientY || (e.touches && e.touches[0].clientY);
                let rect = sigCanvas.getBoundingClientRect();
                sigCtx.lineTo(x - rect.left, y - rect.top);
                sigCtx.stroke();
                sigCtx.beginPath();
                sigCtx.moveTo(x - rect.left, y - rect.top);
            };

            sigCanvas.addEventListener('mousedown', startPos);
            sigCanvas.addEventListener('mouseup', endPos);
            sigCanvas.addEventListener('mousemove', draw);
            sigCanvas.addEventListener('touchstart', startPos, {passive: false});
            sigCanvas.addEventListener('touchend', endPos);
            sigCanvas.addEventListener('touchmove', draw, {passive: false});
        }

        function clearSignature() {
            if(sigCtx && sigCanvas) sigCtx.clearRect(0, 0, sigCanvas.width, sigCanvas.height);
        }

        async function fetchLatestContract() {
            try {
                const { data, error } = await window._sb.from('company_forms').select('*').eq('form_type', 'employment_contract').single();
                if(data) {
                    currentLoadedContractVersion = data.form_version;
                    document.getElementById('contract-version-badge').innerText = data.form_version;
                    document.getElementById('dynamic-contract-content').innerHTML = `
                        <p class="font-bold text-sky-800 bg-sky-100 p-2 rounded border border-sky-200 mb-2">${data.title || '勞動契約與管理規章'}</p>
                        ${data.content}
                    `;
                }
            } catch(e) {
                console.log("合約抓取失敗，使用預設值", e);
                document.getElementById('contract-version-badge').innerText = "V1.0";
                document.getElementById('dynamic-contract-content').innerHTML = "<p>合約載入失敗，請聯繫管理員確認後台設定。</p>";
            }
        }

        async function initApp() {
            populateCities(); 
            try {
                if(!window._sb) throw new Error("Supabase 尚未初始化，請確認 shared.js 內的金鑰設定是否正確。");

                const LIFF_ID = "2009148826-RoogHmxk"; 
                let liffInitSuccess = false;
                
                try {
                    await liff.init({ liffId: LIFF_ID });
                    liffInitSuccess = true;
                } catch(e) {
                    console.warn("LIFF初始化失敗:", e);
                }
                
                if (!liffInitSuccess || (!liff.isInClient() && window.location.protocol !== 'file:')) {
                    if(confirm('偵測到非 LINE APP 環境或 LIFF ID 尚未生效！\n\n是否啟用「網頁開發測試模式」強制進入系統？\n(按「確定」可繞過驗證直接進入註冊測試)')) {
                        globalLineId = "TEST_LOCAL_ID_" + Math.floor(Math.random()*10000);
                    } else {
                        if (!liffInitSuccess) throw new Error(`LIFF app '${LIFF_ID}' was not found. 請確認 LINE Developer 設定。`);
                        if (!liff.isLoggedIn()) { liff.login(); return; }
                        const profile = await liff.getProfile();
                        globalLineId = profile.userId;
                    }
                } else {
                    if (!liff.isLoggedIn()) { liff.login(); return; }
                    const profile = await liff.getProfile();
                    globalLineId = profile.userId;
                }

                const { data: user, error } = await window._sb.from('employees').select('*').eq('line_id', globalLineId).single();
                
                document.getElementById('loading-screen').classList.add('opacity-0');
                setTimeout(() => { document.getElementById('loading-screen').style.display = 'none'; }, 500);

                if (user) {
                    if (user.is_approved && user.employment_status === '在職') {
                        window.location.href = 'app_hr.html';
                    } else if (user.employment_status === '離職' || user.employment_status === '留職停薪') {
                        document.getElementById('unauthorized-screen').classList.remove('hidden');
                        document.getElementById('unauthorized-screen').classList.add('flex');
                    } else {
                        document.getElementById('pending-screen').classList.remove('hidden');
                    }
                } else {
                    document.getElementById('register-screen').classList.remove('hidden');
                    await fetchLatestContract();
                    setTimeout(initSignaturePad, 300);
                }
            } catch (err) {
                console.error('System Init Error:', err);
                const errText = document.getElementById('loading-error-text');
                if(errText) errText.innerText = err.message || err;
                alert('系統初始化發生錯誤！\n\n錯誤訊息：' + (err.message || err));
            }
        }

        async function submitRegistration(e) {
            e.preventDefault();
            
            const blank = document.createElement('canvas');
            blank.width = sigCanvas.width; blank.height = sigCanvas.height;
            if(sigCanvas.toDataURL() === blank.toDataURL()) {
                alert('請在合約下方空白處完成您的數位簽名！'); return;
            }

            const btn = document.getElementById('btn-submit-reg');
            btn.innerText = '資料寫入中...';
            btn.disabled = true;

            const bankVal = document.getElementById('reg-bank-code').value;
            const [bankCode, bankName] = bankVal.split('-');
            
            const fullAddress = document.getElementById('reg-city').value + document.getElementById('reg-district').value + document.getElementById('reg-address-detail').value;
            const onboardDate = document.getElementById('reg-onboard-date').value;

            const payload = {
                line_id: globalLineId,
                full_name: document.getElementById('reg-name').value,
                id_number: document.getElementById('reg-idnum').value.toUpperCase(),
                phone: document.getElementById('reg-phone').value,
                address: fullAddress,
                emergency_contact: document.getElementById('reg-emer-name').value,
                emergency_phone: document.getElementById('reg-emer-phone').value,
                bank_code: bankCode,
                bank_name: bankName,
                bank_account: document.getElementById('reg-bank-acc').value,
                bank_user_name: document.getElementById('reg-bank-user').value,
                onboarding_date: onboardDate, // 🌟 使用自訂輸入的到職日期
                email: document.getElementById('reg-email').value, 
                nda_signed_at: new Date().toISOString(),
                signature_data: sigCanvas.toDataURL("image/png"),
                signed_contract_version: currentLoadedContractVersion,
                is_approved: false,
                employment_status: '在職'
            };

            try {
                const { error } = await window._sb.from('employees').insert([payload]);
                if (error) {
                    if(error.code === '23505') throw new Error('身分證字號已被註冊！');
                    throw error;
                }
                
                // 🌟 強化 Webhook 訊息，包含指示老闆動作的說明
                const bossMsg = `⚠️ 【新進/舊員工註冊通知】\n員工「${payload.full_name}」已提交基本資料與合約簽署。\n\n👉 系統提示：請登入後台「待辦審核」確認身分，並執行【開通】以配發員工編號，或予以駁回刪除。`;
                window._sb.functions.invoke('line-webhook', { body: { action: 'notify_boss_new_emp', name: payload.full_name, message: bossMsg } }).catch(err=>console.log("Webhook 忽略:", err));

                document.getElementById('register-screen').classList.add('hidden');
                document.getElementById('pending-screen').classList.remove('hidden');
            } catch (err) {
                alert('註冊失敗：\n' + (err.message || '資料庫連線錯誤，請確認 Supabase 欄位是否齊全 (包含 signature_data)'));
                btn.innerText = '確認送出並建檔';
                btn.disabled = false;
            }
        }

        window.onload = initApp;
    </script>
