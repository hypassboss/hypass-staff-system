<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HYPASS | 庫存中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { background: #e2e8f0; font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; padding-bottom: 80px;}
        #app-container { background: #f1f5f9; min-height: 100vh; position: relative; overflow-x: hidden; }
        .view-panel { display: none; animation: fadeIn 0.3s ease; } .view-panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .glass-card { background: rgba(255, 255, 255, 0.98); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05); border: 1px solid rgba(255, 255, 255, 0.8); }
        .input-field { width: 100%; padding: 0.75rem 1rem; background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 0.75rem; font-size: 0.875rem; font-weight: bold; color: #1e293b; transition: all 0.2s; }
        .input-field:focus { outline: none; border-color: #0ea5e9; background: #ffffff; box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1); }
        .select-arrow { appearance: none; background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3E%3Cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3E%3C/svg%3E"); background-size: 1.2em 1.2em; background-position: right 0.5rem center; background-repeat: no-repeat; padding-right: 2rem; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        nav { display: none !important; }
        #core-bottom-nav { display: flex !important; }
        @keyframes slideInLeft { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        .toast-msg { animation: slideInLeft 0.4s ease-out forwards; }
    </style>
</head>
<body class="text-slate-800 relative">
    <div id="toast-container" class="fixed bottom-24 left-4 z-[9999] flex flex-col space-y-3 pointer-events-none"></div>

    <div id="loading-screen" class="fixed inset-0 bg-slate-900 z-[9999] flex flex-col items-center justify-center text-white transition-opacity duration-500">
        <div class="text-6xl mb-4 animate-bounce">📦</div>
        <h2 class="text-xl font-black tracking-widest mb-2">HYPASS 庫存中心</h2>
        <p class="text-xs font-bold text-slate-400 tracking-wider">系統載入中...</p>
    </div>

    <div id="app-container" class="max-w-md mx-auto shadow-2xl relative hidden">
        <header class="bg-emerald-900 text-white px-5 py-4 shadow-md sticky top-0 z-50 flex items-center justify-between">
            <button id="btn-back" onclick="openView('dashboard', '庫存中心大廳')" class="hidden bg-white/10 hover:bg-white/20 px-3 py-1.5 rounded-full text-xs font-bold transition flex items-center shrink-0">🔙 返回</button>
            <div class="flex-1 text-center"><h1 class="text-lg font-black italic tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-emerald-300 to-teal-200 truncate" id="header-title">庫存中心大廳</h1></div>
            <div class="shrink-0 text-[10px] font-bold bg-white/10 px-2 py-1 rounded-full border border-white/20" id="user-badge">載入中</div>
        </header>

        <main class="p-4 relative z-10">
            <div id="view-dashboard" class="view-panel active space-y-4">
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <button onclick="openView('ledger', '進出庫作業')" class="glass-card p-4 rounded-2xl flex flex-col items-center justify-center shadow-sm border border-emerald-100 hover:bg-emerald-50 transition active:scale-95">
                        <span class="text-3xl mb-2 drop-shadow-sm">📥</span><span class="font-black text-slate-700 text-xs tracking-widest">進出庫作業</span>
                    </button>
                    <button onclick="openView('stocktake', '實體盤點作業')" class="glass-card p-4 rounded-2xl flex flex-col items-center justify-center shadow-sm border border-emerald-100 hover:bg-emerald-50 transition active:scale-95">
                        <span class="text-3xl mb-2 drop-shadow-sm">📋</span><span class="font-black text-slate-700 text-xs tracking-widest">實體盤點</span>
                    </button>
                </div>

                <div class="glass-card p-5 rounded-2xl shadow-sm border-t-4 border-red-500">
                    <h3 class="font-black text-slate-800 text-sm mb-3 flex items-center"><span class="mr-2 text-lg">🚨</span>低水位警報與請購清單</h3>
                    <div id="low-stock-list" class="space-y-2 max-h-64 overflow-y-auto pr-1 no-scrollbar mb-4">
                        <p class="text-xs text-slate-400 text-center py-4">掃描庫存中...</p>
                    </div>
                    <button id="btn-gen-req" onclick="generateRequisition()" class="w-full bg-red-600 hover:bg-red-700 text-white font-black py-3.5 rounded-xl shadow-md transition active:scale-95 tracking-widest text-sm">🛒 勾選並生成內部請購單</button>
                </div>

                <div class="glass-card p-5 rounded-2xl shadow-sm border-t-4 border-sky-500">
                    <h3 class="font-black text-slate-800 text-sm mb-3 flex items-center"><span class="mr-2 text-lg">📄</span>內部請購單歷史紀錄</h3>
                    <div id="req-history-list" class="space-y-3 max-h-[30vh] overflow-y-auto pr-1 no-scrollbar">
                        <p class="text-xs text-slate-400 text-center py-4">載入中...</p>
                    </div>
                </div>
            </div>

            <div id="view-ledger" class="view-panel space-y-4">
                <div class="glass-card p-5 rounded-2xl shadow-sm border-t-4 border-emerald-500">
                    <h3 class="font-black text-slate-800 text-lg mb-4 flex items-center"><span class="mr-2">📥</span>進出庫登記</h3>
                    <form onsubmit="submitLedger(event)" class="space-y-4">
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 ml-1 block mb-1">作業類型</label>
                            <select id="ledger-type" class="input-field select-arrow font-black">
                                <option value="IN" class="text-emerald-600">📥 入庫 (進貨/退回)</option>
                                <option value="OUT" class="text-red-600">📤 出庫 (領用/消耗)</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 ml-1 block mb-1">選擇料號/品名</label>
                            <select id="ledger-item" class="input-field select-arrow" required></select>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 ml-1 block mb-1">異動數量</label>
                            <input type="number" id="ledger-qty" class="input-field font-black text-lg" min="1" required>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 ml-1 block mb-1">備註單號或說明</label>
                            <input type="text" id="ledger-note" class="input-field" placeholder="例如：採購單號、領用人">
                        </div>
                        <button type="submit" id="btn-ledger-submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black py-4 rounded-xl shadow-lg active:scale-95 transition tracking-widest text-base">確認送出</button>
                    </form>
                </div>
            </div>

            <div id="view-stocktake" class="view-panel space-y-4">
                <div class="glass-card p-5 rounded-2xl shadow-sm border-t-4 border-indigo-500 relative pb-20">
                    <div class="flex justify-between items-center border-b border-slate-100 pb-3 mb-4">
                        <h3 class="font-black text-slate-800 text-lg flex items-center"><span class="mr-2">📋</span>實體盤點作業</h3>
                    </div>
                    <p class="text-[10px] text-slate-500 font-bold mb-4">系統將對比帳面數量與實際盤點數，自動生成盤盈虧紀錄。</p>
                    <div id="stocktake-list" class="space-y-3 mb-6"></div>
                    <button onclick="submitStocktake()" id="btn-stocktake-submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-4 rounded-xl shadow-lg active:scale-95 transition tracking-widest text-base">確認完成盤點</button>
                </div>
            </div>
        </main>
    </div>

    <nav id="core-bottom-nav" class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/95 backdrop-blur-md border-t border-slate-200 flex justify-around text-[10px] font-bold text-slate-400 pb-5 pt-2 z-[9990] shadow-[0_-4px_20px_rgba(0,0,0,0.05)]">
        <div onclick="event.stopPropagation(); window.location.href='app_hr.html'" class="flex-1 flex flex-col items-center py-1 cursor-pointer transition hover:text-sky-600"><span class="text-xl mb-1 opacity-60 grayscale">👨‍💼</span><span class="scale-90">員工</span></div>
        <div onclick="event.stopPropagation(); window.location.href='app_inventory.html'" class="flex-1 flex flex-col items-center py-1 cursor-pointer transition text-emerald-600"><span class="text-xl mb-1">📦</span><span class="scale-90">庫存</span></div>
        <div onclick="event.stopPropagation(); window.location.href='app_purchase.html'" class="flex-1 flex flex-col items-center py-1 cursor-pointer transition hover:text-amber-600"><span class="text-xl mb-1 opacity-60 grayscale">🛒</span><span class="scale-90">採購</span></div>
        <div onclick="event.stopPropagation(); window.location.href='app_sales.html'" class="flex-1 flex flex-col items-center py-1 cursor-pointer transition hover:text-indigo-600"><span class="text-xl mb-1 opacity-60 grayscale">💼</span><span class="scale-90">業務</span></div>
        <div onclick="event.stopPropagation(); window.location.href='app_finance.html'" class="flex-1 flex flex-col items-center py-1 cursor-pointer transition hover:text-blue-600"><span class="text-xl mb-1 opacity-60 grayscale">💰</span><span class="scale-90">財務</span></div>
    </nav>

    <script src="shared.js"></script>
    <script>
        let invItems = [];
        let stockMap = {};

        function showSysToast(msg) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast-msg bg-emerald-600 text-white px-4 py-3 rounded-xl shadow-lg font-black text-sm flex items-center';
            toast.innerHTML = `<span class="mr-2 text-xl">✅</span>${msg}`;
            container.appendChild(toast);
            setTimeout(() => { toast.style.animation = 'slideInLeft 0.4s ease-in reverse forwards'; setTimeout(() => toast.remove(), 400); }, 5000);
        }

        function openView(viewId, title) {
            document.querySelectorAll('.view-panel').forEach(el => el.classList.remove('active'));
            document.getElementById('view-' + viewId).classList.add('active');
            document.getElementById('header-title').innerText = title;
            if(viewId === 'dashboard') document.getElementById('btn-back').classList.add('hidden');
            else document.getElementById('btn-back').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function bootInv() {
            try {
                const isAuth = await authGuard('inv');
                if(!isAuth) return;
                
                document.getElementById('user-badge').innerText = window.currentUser?.full_name || '倉管人員';
                document.getElementById('loading-screen').classList.add('opacity-0');
                setTimeout(() => { document.getElementById('loading-screen').style.display = 'none'; document.getElementById('app-container').classList.remove('hidden'); }, 500);

                await loadInventoryData();
            } catch(e) { console.error(e); }
        }

        async function loadInventoryData() {
            const { data: items } = await window._sb.from('items').select('*');
            const { data: ledgers } = await window._sb.from('inventory_ledgers').select('*');
            invItems = items || [];
            stockMap = {};
            if(ledgers) ledgers.forEach(l => { stockMap[l.item_id] = (stockMap[l.item_id] || 0) + l.change_qty; });
            
            // 載入下拉選單
            const itemOpts = '<option value="" disabled selected>請選擇...</option>' + invItems.map(i => `<option value="${i.id}">[${i.item_code}] ${i.item_name}</option>`).join('');
            document.getElementById('ledger-item').innerHTML = itemOpts;

            // 低水位警報與生成表單
            let lowStockHtml = '';
            invItems.forEach(i => {
                i.current_stock = stockMap[i.id] || 0;
                if(i.current_stock <= (i.safe_stock_level || 0)) {
                    let reqQty = ((i.safe_stock_level || 10) * 2) - i.current_stock;
                    if(reqQty < 1) reqQty = 10;
                    lowStockHtml += `
                    <div class="bg-white p-3 rounded-xl border border-red-200 flex justify-between items-center mb-2 shadow-sm">
                        <div class="flex items-center">
                            <input type="checkbox" class="req-chk w-5 h-5 mr-3 accent-red-600 rounded" value="${i.id}" data-name="${i.item_name}" checked>
                            <div><p class="font-black text-sm text-slate-800">${i.item_code}</p><p class="text-[10px] text-slate-500 truncate w-24">${i.item_name}</p></div>
                        </div>
                        <div class="flex items-center space-x-2">
                            <span class="text-[10px] font-bold text-red-600 bg-red-50 px-1.5 py-0.5 rounded border border-red-100">餘 ${i.current_stock}</span>
                            <div class="flex items-center"><span class="text-[10px] text-slate-500 mr-1 font-bold">請購:</span><input type="number" id="req-qty-${i.id}" value="${reqQty}" class="w-14 p-1 border border-slate-300 rounded text-center text-sm font-black text-slate-800 outline-none focus:border-red-500 bg-slate-50"></div>
                        </div>
                    </div>`;
                }
            });
            document.getElementById('low-stock-list').innerHTML = lowStockHtml || '<p class="text-center text-xs font-bold text-slate-400 py-6 border border-dashed border-slate-200 rounded-xl">✅ 所有庫存皆在安全水位之上</p>';

            // 盤點表單
            document.getElementById('stocktake-list').innerHTML = invItems.map(i => `
                <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex justify-between items-center">
                    <div><h4 class="font-black text-sm text-slate-800">${i.item_code}</h4><p class="text-[10px] text-slate-500">${i.item_name}</p><p class="text-[10px] text-indigo-600 font-bold mt-1">帳面庫存: ${i.current_stock}</p></div>
                    <div class="flex flex-col items-end"><label class="text-[9px] font-bold text-slate-400 mb-1">實際盤點數</label><input type="number" id="st-${i.id}" data-id="${i.id}" data-current="${i.current_stock}" value="${i.current_stock}" class="st-input w-20 p-2 border border-indigo-200 rounded-lg text-center text-sm font-black text-indigo-800 outline-none focus:border-indigo-600 bg-indigo-50"></div>
                </div>
            `).join('');

            // 歷史請購單
            const { data: reqs } = await window._sb.from('requisitions').select('*').order('created_at', {ascending: false});
            const safeReqs = reqs || [];
            document.getElementById('req-history-list').innerHTML = safeReqs.map(r => {
                let stCol = r.status === '已完成' ? 'text-emerald-700 bg-emerald-50 border-emerald-200' : 'text-sky-700 bg-sky-50 border-sky-200';
                let items = [];
                try { items = typeof r.items_json === 'string' ? JSON.parse(r.items_json) : r.items_json; } catch(e){}
                let itemsStr = Array.isArray(items) ? items.map(x => `${x.name} x${x.qty}`).join(', ') : '無明細';
                
                return `<div class="bg-white p-3.5 rounded-xl border border-slate-200 shadow-sm mb-2 hover:bg-slate-50 transition">
                    <div class="flex justify-between items-center mb-1.5 border-b border-slate-100 pb-1.5">
                        <span class="text-[10px] font-black text-slate-500 tracking-wider">${r.req_no}</span>
                        <span class="text-[9px] font-black px-1.5 py-0.5 rounded border ${stCol}">${r.status}</span>
                    </div>
                    <p class="text-xs font-bold text-slate-700 truncate leading-relaxed">品項: ${itemsStr}</p>
                    <p class="text-[9px] text-slate-400 font-bold mt-1 tracking-wider">${new Date(r.created_at).toLocaleDateString('zh-TW')} - 預期: ${r.expected_date||'未定'}</p>
                </div>`;
            }).join('') || '<p class="text-center text-xs font-bold text-slate-400 py-6 border border-dashed border-slate-200 rounded-xl">尚無請購紀錄</p>';
        }

        // 🌟 防彈版：完美生成並寫入 JSONB 請購單
        async function generateRequisition() {
            const checks = document.querySelectorAll('.req-chk:checked');
            if(checks.length === 0) { alert('⚠️ 請先勾選需要請購的品項！'); return; }
            
            const btn = document.getElementById('btn-gen-req');
            btn.innerText = '生成並寫入中...'; btn.disabled = true;

            let items = [];
            checks.forEach(c => {
                const id = c.value;
                const name = c.dataset.name;
                const qty = parseInt(document.getElementById(`req-qty-${id}`).value) || 1;
                items.push({ id, name, qty, unit: '件' });
            });

            const reqNo = 'REQ-' + new Date().toISOString().replace(/[-:T]/g,'').slice(0,14) + Math.floor(Math.random()*100).toString().padStart(2,'0');
            const expectedDate = new Date(Date.now() + 7*86400000).toISOString().split('T')[0]; // 預設 7 天後

            const payload = {
                req_no: reqNo,
                employee_id: window.currentUser.id,
                items_json: items, // Supabase JS SDK 會自動將陣列轉為 Postgres 的 JSONB
                status: '待處理',
                expected_date: expectedDate,
                note: '庫存低水位系統自動生成'
            };

            try {
                const { error } = await window._sb.from('requisitions').insert([payload]);
                if(error) throw error;
                showSysToast('請購單已成功寫入，採購後台已同步更新！');
                await loadInventoryData();
            } catch(e) {
                alert('生成失敗，請確認資料庫：\n' + e.message);
            }
            btn.innerText = '🛒 勾選並生成內部請購單'; btn.disabled = false;
        }

        async function submitLedger(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-ledger-submit');
            btn.innerText = '處理中...'; btn.disabled = true;

            const t = document.getElementById('ledger-type').value;
            const iId = document.getElementById('ledger-item').value;
            const qty = parseInt(document.getElementById('ledger-qty').value);
            const note = document.getElementById('ledger-note').value;
            
            let finalQty = t === 'IN' ? qty : -qty;

            const payload = { item_id: iId, change_type: t, change_qty: finalQty, employee_id: window.currentUser.id, note: note };
            
            try {
                const { error } = await window._sb.from('inventory_ledgers').insert([payload]);
                if(error) throw error;
                showSysToast(`已成功登記${t==='IN'?'入庫':'出庫'} ${qty} 件`);
                e.target.reset();
                await loadInventoryData();
                openView('dashboard', '庫存中心大廳');
            } catch(error) { alert('登記失敗: ' + error.message); }
            btn.innerText = '確認送出'; btn.disabled = false;
        }

        async function submitStocktake() {
            if(!confirm('確認送出實體盤點數據？系統將自動生成盈虧紀錄。')) return;
            const btn = document.getElementById('btn-stocktake-submit');
            btn.innerText = '結算中...'; btn.disabled = true;

            const inputs = document.querySelectorAll('.st-input');
            let payloads = [];
            inputs.forEach(input => {
                const id = input.dataset.id;
                const curr = parseInt(input.dataset.current);
                const actual = parseInt(input.value);
                const diff = actual - curr;
                if(diff !== 0) {
                    payloads.push({ item_id: id, change_type: '盤點調整', change_qty: diff, employee_id: window.currentUser.id, note: `系統盤盈虧: 帳面 ${curr}, 實盤 ${actual}` });
                }
            });

            try {
                if(payloads.length > 0) {
                    const { error } = await window._sb.from('inventory_ledgers').insert(payloads);
                    if(error) throw error;
                    showSysToast(`盤點完成，共調整了 ${payloads.length} 個品項`);
                } else {
                    showSysToast('盤點完成，所有帳面數字與實盤相符！');
                }
                await loadInventoryData();
                openView('dashboard', '庫存中心大廳');
            } catch(e) { alert('盤點失敗: ' + e.message); }
            btn.innerText = '確認完成盤點'; btn.disabled = false;
        }

        window.onload = bootInv;
        const enforceNavObserver = new MutationObserver(() => { const oldNav = document.querySelector('nav:not(#core-bottom-nav)'); if (oldNav) oldNav.remove(); });
        enforceNavObserver.observe(document.body, { childList: true, subtree: true });
    </script>
</body>
</html>
