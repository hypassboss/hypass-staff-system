<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hypass | 業務管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; -webkit-tap-highlight-color: transparent;}
        
        /* 🌟 雙模態底層設定 */
        @media (max-width: 767px) { body { padding-bottom: 80px; background: #e2e8f0; } }
        @media (min-width: 768px) { body { background: #e2e8f0; } }

        /* 🌟 核心：確保主容器在電腦上也是完美的手機比例 (不拉伸) */
        #app-wrapper { display: flex; width: 100%; height: 100vh; overflow: hidden; }
        #app-container { background: #f1f5f9; min-height: 100vh; position: relative; overflow-x: hidden; width: 100%; max-width: 28rem; margin: 0 auto; display: flex; flex-direction: column;}
        
        @media (min-width: 768px) { 
            #app-wrapper { align-items: center; justify-content: center; padding: 20px; }
            #app-container { height: 100%; min-height: auto; max-height: 900px; border-radius: 2rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); overflow-y: auto; }
            nav#core-bottom-nav { display: none !important; } /* 電腦版隱藏底部導覽 */
        }

        .glass-card { background: rgba(255, 255, 255, 0.98); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05); border: 1px solid rgba(255, 255, 255, 0.8); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        nav { display: none !important; }
        #core-bottom-nav { display: flex !important; }
    </style>
</head>
<body class="text-slate-800 relative md:flex md:h-screen md:overflow-hidden w-full">

    <div id="loading-screen" class="fixed inset-0 bg-slate-900 z-[9999] flex flex-col items-center justify-center text-white transition-opacity duration-500">
        <div class="text-6xl mb-4 animate-bounce">💼</div>
        <h2 class="text-xl font-black tracking-widest mb-2">HYPASS 業務中心</h2>
        <p class="text-xs font-bold text-slate-400 tracking-wider">系統載入與權限驗證中...</p>
    </div>

    <aside class="hidden md:flex w-64 bg-slate-900 text-white flex-col h-full shadow-2xl shrink-0 z-20 overflow-y-auto no-scrollbar">
        <div class="p-6 pb-4 border-b border-slate-800 mb-4 sticky top-0 bg-slate-900 z-10">
            <h1 class="text-3xl font-black italic tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-300">HYPASS</h1>
            <span class="text-[10px] text-slate-400 tracking-[0.2em] uppercase font-bold mt-1 block">ERP Frontend</span>
        </div>
        <nav class="flex-1 px-4 space-y-2 pb-6">
            <button onclick="window.location.href='app_hr.html'" class="w-full text-left px-4 py-3.5 rounded-xl font-bold flex items-center transition text-slate-400 hover:text-white hover:bg-slate-800"><span class="mr-3 text-xl opacity-60">👨‍💼</span> 員工中心</button>
            <button onclick="window.location.href='app_inventory.html'" class="w-full text-left px-4 py-3.5 rounded-xl font-bold flex items-center transition text-slate-400 hover:text-white hover:bg-slate-800"><span class="mr-3 text-xl opacity-60">📦</span> 庫存大盤</button>
            <button onclick="window.location.href='app_purchase.html'" class="w-full text-left px-4 py-3.5 rounded-xl font-bold flex items-center transition text-slate-400 hover:text-white hover:bg-slate-800"><span class="mr-3 text-xl opacity-60">🛒</span> 採購中心</button>
            <button onclick="window.location.href='app_sales.html'" class="w-full text-left px-4 py-3.5 rounded-xl font-bold flex items-center transition bg-indigo-600 text-white shadow-md"><span class="mr-3 text-xl">💼</span> 業務中心</button>
            <button onclick="window.location.href='app_finance.html'" class="w-full text-left px-4 py-3.5 rounded-xl font-bold flex items-center transition text-slate-400 hover:text-white hover:bg-slate-800"><span class="mr-3 text-xl opacity-60">💰</span> 財務中心</button>
            <div class="pt-4 mt-4 border-t border-slate-800"></div>
            <button onclick="window.location.href='admin.html'" class="w-full text-left px-4 py-3.5 rounded-xl font-bold flex items-center transition text-amber-500 hover:text-amber-400 hover:bg-slate-800 border border-slate-700"><span class="mr-3 text-xl">👑</span> 指揮中心 (老闆)</button>
        </nav>
        <div class="p-4 border-t border-slate-800 bg-slate-900/50 sticky bottom-0">
            <div class="text-[10px] text-slate-400 mb-1 px-2 font-bold tracking-widest">登入身分</div>
            <div id="desktop-user-badge" class="font-black text-indigo-400 px-2 truncate">載入中...</div>
        </div>
    </aside>

    <div id="app-wrapper">
    <div id="app-container" class="shadow-2xl relative hidden flex-col">
        <header class="bg-slate-900 text-white px-4 py-3 shadow-md sticky top-0 z-50 flex items-center justify-between h-14 relative shrink-0 md:rounded-t-2xl">
            <div class="flex-1 min-w-0 flex justify-center text-center">
                <h1 class="text-base sm:text-lg font-black italic tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-300 truncate px-2" id="header-title">業務管理中心</h1>
            </div>
            <div class="shrink-0 text-[10px] font-bold bg-white/10 px-2 py-1 rounded-full border border-white/20 absolute right-4" id="user-badge">載入中</div>
        </header>

        <main class="p-4 relative z-10 flex-1 overflow-y-auto no-scrollbar flex items-center justify-center min-h-[70vh]">
            <div class="w-full text-center">
                <div class="glass-card p-10 rounded-[3rem] shadow-xl border-t-8 border-indigo-500 relative overflow-hidden">
                    <div class="absolute -right-10 -bottom-10 text-[150px] opacity-5">💼</div>
                    <span class="text-6xl mb-6 block drop-shadow-lg relative z-10">🚀</span>
                    <h2 class="text-2xl font-black text-slate-800 tracking-wider mb-3 relative z-10">業務模組籌備中</h2>
                    <p class="text-sm font-bold text-slate-500 leading-relaxed mx-auto relative z-10">
                        專屬業務人員的報價單、客戶關係管理 (CRM) 與業績儀表板正在火熱開發中。<br><br>敬請期待後續上線！
                    </p>
                </div>
            </div>
        </main>
    </div> </div> <nav id="core-bottom-nav" class="md:hidden fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/95 backdrop-blur-md border-t border-slate-200 flex justify-around text-[10px] font-bold text-slate-400 pb-5 pt-2 z-[9990] shadow-[0_-4px_20px_rgba(0,0,0,0.05)]">
        <div onclick="event.stopPropagation(); window.location.href='app_hr.html'" class="flex-1 flex flex-col items-center py-1 cursor-pointer transition hover:text-sky-600"><span class="text-xl mb-1 opacity-60 grayscale">👨‍💼</span><span class="scale-90">員工</span></div>
        <div onclick="event.stopPropagation(); window.location.href='app_inventory.html'" class="flex-1 flex flex-col items-center py-1 cursor-pointer transition hover:text-emerald-600"><span class="text-xl mb-1 opacity-60 grayscale">📦</span><span class="scale-90">庫存</span></div>
        <div onclick="event.stopPropagation(); window.location.href='app_purchase.html'" class="flex-1 flex flex-col items-center py-1 cursor-pointer transition hover:text-amber-600"><span class="text-xl mb-1 opacity-60 grayscale">🛒</span><span class="scale-90">採購</span></div>
        <div onclick="event.stopPropagation(); window.location.href='app_sales.html'" class="flex-1 flex flex-col items-center py-1 cursor-pointer transition text-indigo-600"><span class="text-xl mb-1">💼</span><span class="scale-90">業務</span></div>
        <div onclick="event.stopPropagation(); window.location.href='app_finance.html'" class="flex-1 flex flex-col items-center py-1 cursor-pointer transition hover:text-blue-600"><span class="text-xl mb-1 opacity-60 grayscale">💰</span><span class="scale-90">財務</span></div>
    </nav>

    <script src="shared.js?v=999"></script>
    <script>
        async function bootSales() {
            try {
                // 🌟 使用新版防死迴圈驗證引擎
                const isAuth = await authGuard('sales'); 
                if(!isAuth) return;

                document.getElementById('user-badge').innerText = window.currentUser?.full_name || '使用者'; 
                if(document.getElementById('desktop-user-badge')) {
                    document.getElementById('desktop-user-badge').innerText = window.currentUser?.full_name || '使用者'; 
                }
                
                document.getElementById('loading-screen').classList.add('opacity-0');
                setTimeout(() => { 
                    document.getElementById('loading-screen').style.display = 'none'; 
                    document.getElementById('app-container').classList.remove('hidden'); 
                }, 400);

            } catch(e) {
                console.error(e);
            }
        }

        window.onload = () => {
            bootSales();
            const enforceNavObserver = new MutationObserver(() => { const oldNav = document.querySelector('nav:not(#core-bottom-nav)'); if (oldNav) oldNav.remove(); });
            enforceNavObserver.observe(document.body, { childList: true, subtree: true });
        }
    </script>
</body>
</html>
