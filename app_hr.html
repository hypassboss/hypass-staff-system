        .view-panel { display: none; animation: fadeIn 0.3s ease; } .view-panel.active { display: block; }

        .glass-card { background: #ffffff; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05); border: 1px solid rgba(226, 232, 240, 0.8); }

    <script>
        let sigPad = null;
        let myEmpData = null;
        let latestContractVersion = 'v1.0';

        function showSysToast(msg) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast-msg bg-slate-900 text-white px-5 py-4 rounded-2xl shadow-2xl border border-slate-700 font-black text-sm flex items-center justify-center tracking-wider text-center';
            toast.innerHTML = msg;
            container.appendChild(toast);
            setTimeout(() => { 
                toast.style.animation = 'slideInLeft 0.4s ease-in reverse forwards'; 
                setTimeout(() => toast.remove(), 400); 
            }, 3000);
        }

        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        function openView(viewId, title) {
            document.querySelectorAll('.view-panel').forEach(el => el.classList.remove('active')); 
            document.getElementById('view-' + viewId).classList.add('active');
            document.getElementById('header-title').innerText = title; 
            if(viewId === 'dashboard') {
                document.getElementById('btn-back').classList.add('hidden');
            } else {
                document.getElementById('btn-back').classList.remove('hidden');
            }
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function backToDash() { openView('dashboard', '員工中心'); }

        // 🌟 啟動函數 (接住 index.html 傳來的驗證)
        async function bootHR() {
            try {
                // 基本驗證，只要有登入資訊且狀態正常即可
                const isAuth = await authGuard(); 
                if(!isAuth) return;

                const empId = window.currentUser.id;
                const { data: emp, error } = await window._sb.from('employees').select('*').eq('id', empId).single();
                if(error || !emp) throw new Error('讀取員工資料失敗');
                myEmpData = emp;

                document.getElementById('user-badge').innerText = emp.full_name || '使用者'; 
                if(document.getElementById('desktop-user-badge')) {
                    document.getElementById('desktop-user-badge').innerText = emp.full_name || '使用者'; 
                }

                // 移除載入遮罩
                document.getElementById('loading-screen').classList.add('opacity-0');
                setTimeout(() => { 
                    document.getElementById('loading-screen').style.display = 'none'; 
                    document.getElementById('app-container').classList.remove('hidden'); 
                    document.getElementById('app-container').classList.add('flex');
                }, 400);

                startClock();
                await loadContractStatus();
                await loadBulletins();
                
                const now = new Date();
                document.getElementById('history-month').value = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;

            } catch(e) {
                console.error(e);
                const ls = document.getElementById('loading-screen');
                if(ls) ls.innerHTML = '<div class="text-4xl mb-4">💥</div><h2 class="text-xl font-black text-white">系統發生錯誤</h2><p class="text-slate-400 mt-2 px-4 text-xs break-all">' + e.message + '</p><button onclick="window.location.href=\'index.html\'" class="mt-6 bg-white text-slate-900 px-6 py-2 rounded-full font-bold">重新登入</button>';
            }
        }

        function startClock() {
            setInterval(() => {
                const now = new Date();
                const days = ['日','一','二','三','四','五','六'];
                document.getElementById('current-date').innerText = `${now.getMonth()+1}月${now.getDate()}日 星期${days[now.getDay()]}`;
                document.getElementById('current-time').innerText = now.toLocaleTimeString('en-US', {hour12:false});
            }, 1000);
        }

        // 🌟 GPS 打卡功能
        function doPunch(type) {
            if(!navigator.geolocation) {
                alert('您的瀏覽器不支援定位功能，無法打卡！');
                return;
            }
            
            const btn = document.getElementById(type === 'IN' ? 'btn-punch-in' : 'btn-punch-out');
            const ogText = btn.innerHTML;
            btn.innerHTML = '<span class="text-sm font-black animate-pulse">定位中...</span>';
            btn.disabled = true;

            navigator.geolocation.getCurrentPosition(
                async (pos) => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    try {
                        const payload = {
                            employee_id: myEmpData.id,
                            punch_type: type,
                            punch_time: new Date().toISOString(),
                            latitude: lat,
                            longitude: lng,
                            branch_id: myEmpData.default_branch_id || null
                        };
                        const { error } = await window._sb.from('attendance_logs').insert([payload]);
                        if(error) throw error;

                        showSysToast(`✅ ${type==='IN'?'上班':'下班'}打卡成功！`);
                        document.getElementById('punch-status').innerText = `上次打卡：${new Date().toLocaleTimeString()} (${type})`;
                    } catch(e) {
                        alert('打卡寫入失敗: ' + e.message);
                    } finally {
                        btn.innerHTML = ogText;
                        btn.disabled = false;
                    }
                },
                (err) => {
                    alert('無法取得定位，請開啟手機定位權限！');
                    btn.innerHTML = ogText;
                    btn.disabled = false;
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        }

        // 🌟 請假與補登
        function openLeaveForm() {
            openView('leave', '請假/補登申請');
            toggleLeaveType();
        }

        function toggleLeaveType() {
            const type = document.getElementById('leave-type').value;
            if(type === '忘記打卡(補登)') {
                document.getElementById('block-makeup').classList.remove('hidden');
                document.getElementById('block-leave').classList.add('hidden');
            } else {
                document.getElementById('block-makeup').classList.add('hidden');
                document.getElementById('block-leave').classList.remove('hidden');
            }
        }

        async function submitLeave(e) {
            e.preventDefault();
            const type = document.getElementById('leave-type').value;
            const reason = document.getElementById('leave-reason').value;
            
            let sTime, eTime, targetPunch = null;

            if(type === '忘記打卡(補登)') {
                sTime = document.getElementById('makeup-time').value;
                eTime = sTime; 
                targetPunch = document.querySelector('input[name="makeup-dir"]:checked').value;
                if(!sTime) { alert('請選擇補登時間'); return; }
            } else {
                sTime = document.getElementById('leave-start').value;
                eTime = document.getElementById('leave-end').value;
                if(!sTime || !eTime) { alert('請選擇完整的請假起訖時間'); return; }
                if(new Date(sTime) >= new Date(eTime)) { alert('結束時間必須大於開始時間'); return; }
            }

            const payload = {
                employee_id: myEmpData.id,
                leave_type: type,
                start_time: new Date(sTime).toISOString(),
                end_time: new Date(eTime).toISOString(),
                reason: reason || '無',
                target_punch_type: targetPunch,
                status: '審核中'
            };

            try {
                const { error } = await window._sb.from('leave_requests').insert([payload]);
                if(error) throw error;
                showSysToast('✅ 申請已送出，請等待主管審核！');
                e.target.reset();
                toggleLeaveType();
                backToDash();
            } catch(err) { alert('申請失敗'); }
        }

        // 🌟 紀錄查詢
        function openHistory() {
            openView('history', '我的紀錄');
            loadHistory();
        }

        function switchHistTab(tab) {
            document.getElementById('tab-log').classList.toggle('bg-white', tab==='log');
            document.getElementById('tab-log').classList.toggle('text-slate-800', tab==='log');
            document.getElementById('tab-log').classList.toggle('text-slate-500', tab!=='log');
            document.getElementById('tab-leave').classList.toggle('bg-white', tab==='leave');
            document.getElementById('tab-leave').classList.toggle('text-slate-800', tab==='leave');
            document.getElementById('tab-leave').classList.toggle('text-slate-500', tab!=='leave');
            
            document.getElementById('ui-hist-logs').classList.toggle('hidden', tab!=='log');
            document.getElementById('ui-hist-leaves').classList.toggle('hidden', tab!=='leave');
        }

        async function loadHistory() {
            const m = document.getElementById('history-month').value;
            if(!m) return;
            const y = m.split('-')[0]; const mo = m.split('-')[1];
            const sD = new Date(y, mo-1, 1).toISOString();
            const eD = new Date(y, mo, 0, 23, 59, 59).toISOString();

            document.getElementById('ui-hist-logs').innerHTML = '<p class="text-center text-xs text-slate-400 py-4">讀取中...</p>';
            
            try {
                const { data: logs } = await window._sb.from('attendance_logs').select('*').eq('employee_id', myEmpData.id).gte('punch_time', sD).lte('punch_time', eD).order('punch_time', {ascending: false});
                const elLog = document.getElementById('ui-hist-logs');
                if(logs && logs.length > 0) {
                    elLog.innerHTML = logs.map(l => `
                        <div class="bg-white p-3 rounded-xl border border-slate-200 shadow-sm flex justify-between items-center transition hover:bg-slate-50">
                            <div>
                                <span class="text-[10px] font-black text-slate-500 tracking-wider">${new Date(l.punch_time).toLocaleDateString('zh-TW')}</span>
                                <h4 class="font-mono font-black text-slate-800 text-base mt-0.5">${new Date(l.punch_time).toLocaleTimeString('en-US',{hour12:false})}</h4>
                            </div>
                            <span class="text-[11px] font-black px-3 py-1.5 rounded-lg border ${l.punch_type==='IN'?'bg-emerald-50 text-emerald-700 border-emerald-200':'bg-indigo-50 text-indigo-700 border-indigo-200'}">${l.punch_type==='IN'?'上班':'下班'}</span>
                        </div>
                    `).join('');
                } else { elLog.innerHTML = '<p class="text-center text-xs text-slate-400 py-6 border border-dashed border-slate-200 rounded-xl bg-white">無打卡紀錄</p>'; }

                const { data: leaves } = await window._sb.from('leave_requests').select('*').eq('employee_id', myEmpData.id).gte('created_at', sD).lte('created_at', eD).order('created_at', {ascending: false});
                const elLv = document.getElementById('ui-hist-leaves');
                if(leaves && leaves.length > 0) {
                    elLv.innerHTML = leaves.map(l => {
                        let stCol = l.status==='核准'?'text-emerald-700 bg-emerald-50 border-emerald-200':(l.status==='核駁'?'text-red-700 bg-red-50 border-red-200':'text-sky-700 bg-sky-50 border-sky-200');
                        let isRet = l.leave_type.includes('補登');
                        let tStr = isRet ? new Date(l.start_time).toLocaleString('zh-TW').slice(5,-3) : `${new Date(l.start_time).toLocaleString('zh-TW').slice(5,-3)} ~ ${new Date(l.end_time).toLocaleString('zh-TW').slice(5,-3)}`;
                        return `
                        <div class="bg-white p-4 rounded-[1rem] border border-slate-200 shadow-sm flex flex-col transition">
                            <div class="flex justify-between items-start mb-2 border-b border-slate-100 pb-2">
                                <span class="text-[11px] font-black text-slate-800 tracking-widest">${l.leave_type}</span>
                                <span class="text-[9px] font-black px-2 py-0.5 rounded border ${stCol}">${l.status}</span>
                            </div>
                            <div class="bg-slate-50 p-2 rounded-lg font-mono text-[10px] text-slate-600 mb-2">${tStr}</div>
                            <p class="text-[10px] text-slate-500 font-bold truncate">原因: ${l.reason}</p>
                        </div>`;
                    }).join('');
                } else { elLv.innerHTML = '<p class="text-center text-xs text-slate-400 py-6 border border-dashed border-slate-200 rounded-xl bg-white">無申請紀錄</p>'; }
                
            } catch(e) {}
        }

        // 🌟 公告與通知
        async function openBulletins() {
            openView('bulletin', '公告與通知');
            await loadBulletins();
        }

        async function loadBulletins() {
            try {
                // 個人通知
                const { data: pb } = await window._sb.from('personal_bulletins').select('*').eq('employee_id', myEmpData.id).order('created_at', {ascending: false});
                let pbHtml = '';
                let unreadCount = 0;
                if(pb && pb.length > 0) {
                    pbHtml = pb.map(b => {
                        let stBadge = b.is_read ? '<span class="text-[8px] bg-slate-100 text-slate-400 px-1.5 rounded">已讀</span>' : '<span class="text-[8px] bg-red-100 text-red-600 px-1.5 rounded animate-pulse">未讀</span>';
                        if(!b.is_read) unreadCount++;
                        return `
                        <div class="bg-white p-4 rounded-[1rem] border ${b.is_read?'border-slate-200':'border-red-300 shadow-md'} transition relative" onclick="readPb('${b.id}')">
                            <div class="flex justify-between items-start mb-2">
                                <h4 class="font-black text-sm text-slate-800 pr-2">${b.title}</h4>
                                ${stBadge}
                            </div>
                            <p class="text-[11px] font-bold text-slate-600 mb-2 leading-relaxed whitespace-pre-wrap">${b.content}</p>
                            <div class="text-[9px] text-slate-400 text-right">${new Date(b.created_at).toLocaleString('zh-TW')}</div>
                        </div>`;
                    }).join('');
                } else { pbHtml = '<p class="text-xs text-slate-400 italic text-center py-4">無個人通知</p>'; }
                document.getElementById('ui-personal-bull').innerHTML = pbHtml;

                // 更新首頁紅點
                const badge1 = document.getElementById('badge-bulletin');
                const banner = document.getElementById('ui-alert-banner');
                if(unreadCount > 0) {
                    badge1.classList.remove('hidden');
                    banner.classList.remove('hidden');
                } else {
                    badge1.classList.add('hidden');
                    banner.classList.add('hidden');
                }

                // 公司公告
                const { data: cb } = await window._sb.from('bulletin_board').select('*').order('created_at', {ascending: false}).limit(5);
                let cbHtml = '';
                if(cb && cb.length > 0) {
                    cbHtml = cb.map(b => `
                        <div class="bg-white p-4 rounded-[1rem] border border-slate-200 shadow-sm transition">
                            <h4 class="font-black text-sm text-slate-800 mb-1 flex items-center"><span class="mr-1.5">📌</span>${b.title}</h4>
                            <p class="text-[11px] font-bold text-slate-500 mb-2 leading-relaxed line-clamp-3">${b.content}</p>
                            <div class="text-[9px] text-amber-600 font-bold border-t border-slate-100 pt-2">${new Date(b.created_at).toLocaleDateString('zh-TW')} 發布</div>
                        </div>
                    `).join('');
                } else { cbHtml = '<p class="text-xs text-slate-400 italic text-center py-4">無公司公告</p>'; }
                document.getElementById('ui-company-bull').innerHTML = cbHtml;

            } catch(e){}
        }

        async function readPb(id) {
            await window._sb.from('personal_bulletins').update({is_read: true}).eq('id', id);
            loadBulletins(); // refresh UI
        }

        // 🌟 勞動契約簽署
        async function loadContractStatus() {
            try {
                const { data: form } = await window._sb.from('company_forms').select('*').eq('form_type', 'employment_contract').single();
                if(form) {
                    latestContractVersion = form.version || 'v1.0';
                    const badge = document.getElementById('badge-contract');
                    if (myEmpData.signed_contract_version !== latestContractVersion) {
                        badge.classList.remove('hidden');
                        document.getElementById('contract-content').innerHTML = form.content;
                    } else {
                        badge.classList.add('hidden');
                        document.getElementById('contract-content').innerHTML = `<div class="text-center py-10"><span class="text-6xl block mb-4">✅</span><h3 class="text-xl font-black text-emerald-600">合約已簽署完成</h3><p class="text-xs font-bold text-slate-500 mt-2">您已簽署最新版本 (${latestContractVersion})</p></div>`;
                        document.getElementById('contract-sign-area').style.display = 'none';
                    }
                }
            } catch(e) {}
        }

        function openContract() {
            openModal('contract-modal');
            if (myEmpData.signed_contract_version !== latestContractVersion && !sigPad) {
                const canvas = document.getElementById('signature-pad');
                // Setup canvas size based on its actual rendered dimensions
                function resizeCanvas() {
                    const ratio = Math.max(window.devicePixelRatio || 1, 1);
                    canvas.width = canvas.offsetWidth * ratio;
                    canvas.height = canvas.offsetHeight * ratio;
                    canvas.getContext("2d").scale(ratio, ratio);
                }
                resizeCanvas();
                sigPad = new SignaturePad(canvas, { minWidth: 1, maxWidth: 3, penColor: 'rgb(15, 23, 42)' });
            }
        }

        function clearSignature() { if(sigPad) sigPad.clear(); }

        async function submitSignature() {
            if(!sigPad || sigPad.isEmpty()) { alert('請在空白處簽名！'); return; }
            const dataUrl = sigPad.toDataURL('image/png');
            
            try {
                const { error } = await window._sb.from('employees').update({
                    signature_data: dataUrl,
                    signed_contract_version: latestContractVersion,
                    nda_signed_at: new Date().toISOString()
                }).eq('id', myEmpData.id);
                
                if(error) throw error;
                showSysToast('✅ 勞動契約簽署成功！');
                myEmpData.signed_contract_version = latestContractVersion;
                closeModal('contract-modal');
                loadContractStatus();
            } catch(e) { alert('儲存失敗'); }
        }

        window.onload = bootHR;
    </script>
