<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HYPASS | 企業指揮中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #f8fafc; -webkit-tap-highlight-color: transparent; font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;} 
        .tab-content { display: none; } .tab-content.active { display: block; animation: fadeIn 0.3s ease-in-out; } 
        @keyframes fadeIn { from{opacity:0; transform: translateY(5px);} to{opacity:1; transform: translateY(0);} } 
        .no-scrollbar::-webkit-scrollbar { display: none; } 
        .glass-panel { background: #ffffff; border-radius: 1.5rem; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01); border: 1px solid #e2e8f0; } 
        .admin-input { width: 100%; padding: 0.875rem; border: 1px solid #cbd5e1; border-radius: 0.75rem; font-size: 0.875rem; transition: all 0.2s; } 
        .admin-input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); } 
        .modal { display: none; } .modal.active { display: flex; z-index: 100; } 
        .dt-btn.active { background-color: #0284c7; color: white; }
        .select-arrow { appearance: none; background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3E%3Cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3E%3C/svg%3E"); background-size: 1.5em 1.5em; background-position: right 0.5rem center; background-repeat: no-repeat; padding-right: 2rem; }
    </style>
</head>
<body class="text-slate-800 font-sans min-h-screen md:h-screen md:overflow-hidden md:flex bg-slate-50">

    <div id="login-box" class="flex flex-col items-center justify-center min-h-screen px-5 md:w-full z-50">
        <div class="glass-panel p-8 w-full max-w-sm text-center relative overflow-hidden">
            <div class="absolute top-0 right-0 bg-sky-600 text-white text-[9px] font-bold px-2 py-1 rounded-bl-lg">ERP Admin</div>
            <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl shadow-inner">👑</div>
            <h2 class="text-2xl font-black mb-2 text-slate-800">最高權限驗證</h2>
            <p class="text-xs text-slate-500 mb-6">請輸入管理金鑰解鎖指揮中心</p>
            <input type="password" id="pin" placeholder="PIN CODE" class="admin-input text-center text-2xl tracking-[0.5em] mb-6 bg-slate-50 font-black text-slate-700" onkeypress="if(event.key==='Enter') login()">
            <button onclick="login()" class="w-full bg-slate-900 text-white font-black py-4 rounded-xl shadow-lg active:scale-95 transition-transform">驗證並登入</button>
        </div>
    </div>

    <div id="dashboard-ui" class="hidden flex-col md:flex-row h-screen w-full md:overflow-hidden">
        <header class="md:hidden bg-gradient-to-r from-slate-900 to-slate-800 text-white p-5 flex justify-between items-center shadow-lg sticky top-0 z-50 shrink-0">
            <div><h1 class="text-xl font-black italic tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-sky-400 to-indigo-300">HYPASS</h1><span class="text-[9px] text-slate-400 tracking-[0.2em] uppercase font-bold">Admin ERP</span></div>
            <button onclick="location.reload()" class="text-[10px] bg-white/10 border border-white/20 hover:bg-red-500 hover:border-red-500 px-3 py-1.5 rounded-full font-bold transition-all">安全登出</button>
        </header>

        <aside class="hidden md:flex w-64 bg-slate-900 text-white flex-col h-full shadow-2xl shrink-0 z-20 overflow-y-auto no-scrollbar">
            <div class="p-6 pb-2 border-b border-slate-800 mb-4"><h1 class="text-2xl font-black italic tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-sky-400 to-indigo-300">HYPASS</h1><span class="text-[10px] text-slate-400 tracking-[0.2em] uppercase font-bold">Admin Dashboard</span></div>
            <nav class="flex-1 px-4 space-y-2 pb-6">
                <button onclick="st('pend')" id="dt-pend" class="dt-btn active w-full text-left px-4 py-3.5 rounded-xl font-bold flex items-center transition text-slate-400 hover:text-white hover:bg-slate-800"><span class="mr-3 text-xl">🔴</span> 待辦審核</button>
                <button onclick="st('pay')" id="dt-pay" class="dt-btn w-full text-left px-4 py-3.5 rounded-xl font-bold flex items-center transition text-slate-400 hover:text-white hover:bg-slate-800"><span class="mr-3 text-xl">💰</span> 綜合薪資發放</button>
                <button onclick="st('emps')" id="dt-emps" class="dt-btn w-full text-left px-4 py-3.5 rounded-xl font-bold flex items-center transition text-slate-400 hover:text-white hover:bg-slate-800"><span class="mr-3 text-xl">👥</span> 員工總表/離職</button>
                <button onclick="st('att')" id="dt-att" class="dt-btn w-full text-left px-4 py-3.5 rounded-xl font-bold flex items-center transition text-slate-400 hover:text-white hover:bg-slate-800"><span class="mr-3 text-xl">📋</span> 出勤紀錄大盤</button>
                <button onclick="st('inv')" id="dt-inv" class="dt-btn w-full text-left px-4 py-3.5 rounded-xl font-bold flex items-center transition text-slate-400 hover:text-white hover:bg-slate-800"><span class="mr-3 text-xl">📦</span> 庫存清單管理</button>
                <button onclick="st('pur')" id="dt-pur" class="dt-btn w-full text-left px-4 py-3.5 rounded-xl font-bold flex items-center transition text-slate-400 hover:text-white hover:bg-slate-800"><span class="mr-3 text-xl">🛒</span> 採購與請購中心</button>
                <button onclick="st('fin')" id="dt-fin" class="dt-btn w-full text-left px-4 py-3.5 rounded-xl font-bold flex items-center transition text-slate-400 hover:text-white hover:bg-slate-800"><span class="mr-3 text-xl">💵</span> 財務對帳大盤</button>
                <button onclick="st('sal')" id="dt-sal" class="dt-btn w-full text-left px-4 py-3.5 rounded-xl font-bold flex items-center transition text-slate-400 hover:text-white hover:bg-slate-800"><span class="mr-3 text-xl">💼</span> 業務管理中心</button>
                <button onclick="st('brs')" id="dt-brs" class="dt-btn w-full text-left px-4 py-3.5 rounded-xl font-bold flex items-center transition text-slate-400 hover:text-white hover:bg-slate-800"><span class="mr-3 text-xl">📍</span> 企業據點管理</button>
                <button onclick="st('bull')" id="dt-bull" class="dt-btn w-full text-left px-4 py-3.5 rounded-xl font-bold flex items-center transition text-slate-400 hover:text-white hover:bg-slate-800"><span class="mr-3 text-xl">📢</span> 系統公告推播</button>
            </nav>
            <div class="p-4 border-t border-slate-800"><button onclick="location.reload()" class="w-full bg-slate-800 hover:bg-red-500 text-slate-300 hover:text-white py-3 rounded-xl font-bold transition">安全登出</button></div>
        </aside>

        <main class="flex-1 overflow-y-auto w-full p-4 md:p-8 bg-slate-50 relative pb-20 md:pb-8">
            <div class="grid grid-cols-3 gap-3 mb-8 md:hidden">
                <button onclick="st('pend')" id="m-pend" class="m-btn active flex flex-col items-center justify-center py-4 bg-slate-900 text-white rounded-2xl shadow-md border border-transparent transition-all"><span class="text-3xl mb-1.5 drop-shadow-md">🔴</span><span class="m-text text-[11px] font-black tracking-widest">待辦審核</span></button>
                <button onclick="st('pay')" id="m-pay" class="m-btn flex flex-col items-center justify-center py-4 bg-white text-slate-500 rounded-2xl border border-slate-200 transition-all shadow-sm"><span class="text-3xl mb-1.5 drop-shadow-sm">💰</span><span class="m-text text-[11px] font-bold tracking-widest">薪資發放</span></button>
                <button onclick="st('emps')" id="m-emps" class="m-btn flex flex-col items-center justify-center py-4 bg-white text-slate-500 rounded-2xl border border-slate-200 transition-all shadow-sm"><span class="text-3xl mb-1.5 drop-shadow-sm opacity-80">👥</span><span class="m-text text-[11px] font-bold tracking-widest">員工/離職</span></button>
                <button onclick="st('att')" id="m-att" class="m-btn flex flex-col items-center justify-center py-4 bg-white text-slate-500 rounded-2xl border border-slate-200 transition-all shadow-sm"><span class="text-3xl mb-1.5 drop-shadow-sm opacity-80">📋</span><span class="m-text text-[11px] font-bold tracking-widest">出勤大盤</span></button>
                <button onclick="st('inv')" id="m-inv" class="m-btn flex flex-col items-center justify-center py-4 bg-white text-slate-500 rounded-2xl border border-slate-200 transition-all shadow-sm"><span class="text-3xl mb-1.5 drop-shadow-sm opacity-80">📦</span><span class="m-text text-[11px] font-bold tracking-widest">庫存清單</span></button>
                <button onclick="st('pur')" id="m-pur" class="m-btn flex flex-col items-center justify-center py-4 bg-white text-slate-500 rounded-2xl border border-slate-200 transition-all shadow-sm"><span class="text-3xl mb-1.5 drop-shadow-sm opacity-80">🛒</span><span class="m-text text-[11px] font-bold tracking-widest">採購管理</span></button>
                <button onclick="st('fin')" id="m-fin" class="m-btn flex flex-col items-center justify-center py-4 bg-white text-slate-500 rounded-2xl border border-slate-200 transition-all shadow-sm"><span class="text-3xl mb-1.5 drop-shadow-sm opacity-80">💵</span><span class="m-text text-[11px] font-bold tracking-widest">財務對帳</span></button>
                <button onclick="st('sal')" id="m-sal" class="m-btn flex flex-col items-center justify-center py-4 bg-white text-slate-500 rounded-2xl border border-slate-200 transition-all shadow-sm"><span class="text-3xl mb-1.5 drop-shadow-sm opacity-80">💼</span><span class="m-text text-[11px] font-bold tracking-widest">業務總表</span></button>
                <button onclick="st('brs')" id="m-brs" class="m-btn flex flex-col items-center justify-center py-4 bg-white text-slate-500 rounded-2xl border border-slate-200 transition-all shadow-sm"><span class="text-3xl mb-1.5 drop-shadow-sm opacity-80">📍</span><span class="m-text text-[11px] font-bold tracking-widest">據點管理</span></button>
                <button onclick="st('bull')" id="m-bull" class="m-btn flex flex-col items-center justify-center py-4 bg-white text-slate-500 rounded-2xl border border-slate-200 transition-all shadow-sm col-span-3"><span class="text-3xl mb-1.5 drop-shadow-sm opacity-80">📢</span><span class="m-text text-[11px] font-bold tracking-widest">系統公告推播</span></button>
            </div>

            <section id="emps" class="tab-content space-y-5 max-w-6xl">
                <div>
                    <h3 class="font-black text-slate-800 border-l-4 border-sky-500 pl-3 text-lg mb-4">員工資料總表與管理</h3>
                    <div id="list-emps-mobile" class="space-y-3 md:hidden">載入中...</div>
                    <div class="hidden md:block bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                        <table class="w-full text-left text-sm whitespace-nowrap">
                            <thead class="bg-slate-50 border-b border-slate-200 text-slate-500 font-bold">
                                <tr><th class="px-6 py-4">編號</th><th class="px-6 py-4">姓名 / 據點</th><th class="px-6 py-4">聯絡電話</th><th class="px-6 py-4">核定底薪</th><th class="px-6 py-4 text-center">操作</th></tr>
                            </thead>
                            <tbody id="list-emps-desktop" class="divide-y divide-slate-100"></tbody>
                        </table>
                    </div>
                </div>
            </section>
            
            <section id="pend" class="tab-content active space-y-6 max-w-4xl"><div><h3 class="font-black text-slate-800 border-l-4 border-blue-500 pl-3 text-lg mb-3">新進員工審核</h3><div id="list-pend" class="space-y-3"></div></div><div><h3 class="font-black text-slate-800 border-l-4 border-amber-500 pl-3 text-lg mb-3">簽核中心 (含補登申請)</h3><div id="list-leaves" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div></div></section>
        </main>
    </div>

    <div id="emp-detail-modal" class="modal fixed inset-0 bg-slate-900/70 backdrop-blur-sm items-end justify-center pb-0 z-[100] md:items-center">
        <div class="bg-slate-50 w-full max-w-3xl md:max-w-4xl rounded-t-[2rem] md:rounded-3xl h-[92vh] flex flex-col shadow-2xl relative overflow-hidden">
            <div class="bg-white flex justify-between items-center p-5 md:p-6 border-b border-slate-200 shrink-0 shadow-sm z-10">
                <h3 class="font-black text-xl text-slate-800 flex items-center"><span class="text-2xl mr-2">🪪</span>檔案管理中心</h3>
                <div class="flex space-x-2">
                    <button id="btn-edit-emp" class="bg-sky-50 text-sky-700 px-4 py-2 rounded-full font-black text-xs shadow-sm">✏️ 編輯</button>
                    <button onclick="closeModal('emp-detail-modal')" class="bg-slate-100 text-slate-600 px-4 py-2 rounded-full font-black text-xs">✕ 關閉</button>
                </div>
            </div>
            
            <div class="overflow-y-auto p-5 md:p-8 space-y-6 flex-1 no-scrollbar">
                <div id="ui-emp-full-info"></div>
                
                <div class="bg-white p-6 rounded-2xl border border-red-200 shadow-sm" id="ui-emp-offboard-section">
                    <h4 class="font-black text-red-700 mb-3 border-l-4 border-red-500 pl-2 text-lg">⚖️ 離職與結算</h4>
                    <div class="grid grid-cols-2 gap-4 mb-5">
                        <div><label class="text-[10px] font-bold text-slate-500 ml-1 block">離職類別</label><select id="modal-off-type" class="admin-input bg-slate-50"><option value="自願離職">自願離職</option><option value="非自願離職(資遣)">非自願資遣</option></select></div>
                        <div><label class="text-[10px] font-bold text-slate-500 ml-1 block">最後工作日</label><input type="date" id="modal-off-date" class="admin-input bg-slate-50"></div>
                    </div>
                    <button onclick="calculateSettlement()" class="w-full border-2 border-slate-800 text-slate-800 font-black py-3 rounded-xl hover:bg-slate-800 hover:text-white transition">⚙️ 產生結算報表</button>
                    
                    <div id="modal-off-result" class="hidden mt-6 border-t border-slate-200 pt-5 space-y-2">
                        <div class="flex justify-between text-sm px-2"><span class="font-bold text-slate-500">核算底薪</span><span id="res-base" class="font-black text-slate-700">0</span></div>
                        <div class="flex justify-between text-sm px-2"><span class="font-bold text-slate-500">破月薪資</span><span id="res-pro" class="font-black text-emerald-600">0</span></div>
                        <div class="flex justify-between text-sm px-2"><span class="font-bold text-slate-500">特休換現</span><span id="res-lvp" class="font-black text-emerald-600">0</span></div>
                        <div class="flex justify-between text-sm px-2"><span class="font-bold text-slate-500">資遣費</span><span id="res-sev" class="font-black text-amber-600">0</span></div>
                        <div class="flex justify-between text-base items-end pt-2 px-2"><span class="font-black text-slate-800">總計發放</span><span id="res-total" class="text-2xl font-black text-red-600">0</span></div>
                        <button onclick="confirmOffboarding()" class="w-full bg-red-600 text-white font-black py-4 rounded-xl mt-4">⚠️ 確認結算並停權</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="shared.js"></script>
    <script>
        let globalOffboardData = null; 
        window.empData = {}; window.allEmps = []; window.branches = [];

        function login() { 
            if(document.getElementById('pin').value === '888888'){ 
                document.getElementById('login-box').style.display='none'; 
                document.getElementById('dashboard-ui').classList.remove('hidden'); 
                document.getElementById('dashboard-ui').classList.add('flex'); 
                loadAll(); 
            } else { alert('密碼錯誤！'); } 
        }

        function st(id) { 
            document.querySelectorAll('.tab-content').forEach(e=>e.classList.remove('active')); 
            document.querySelectorAll('.m-btn').forEach(e=>{ e.classList.remove('bg-slate-900','text-white','shadow-md','border-transparent'); e.classList.add('bg-white','text-slate-500','border-slate-200','shadow-sm'); e.querySelector('.m-text').classList.remove('font-black'); e.querySelector('.m-text').classList.add('font-bold'); }); 
            const activeMBtn = document.getElementById('m-'+id); 
            if(activeMBtn) { activeMBtn.classList.remove('bg-white','text-slate-500','border-slate-200','shadow-sm'); activeMBtn.classList.add('bg-slate-900','text-white','shadow-md','border-transparent'); activeMBtn.querySelector('.m-text').classList.remove('font-bold'); activeMBtn.querySelector('.m-text').classList.add('font-black'); } 
            document.querySelectorAll('.dt-btn').forEach(e=>{ e.classList.remove('active','bg-sky-600','text-white'); e.classList.add('text-slate-400'); }); 
            const activeDtBtn = document.getElementById('dt-'+id); 
            if(activeDtBtn) { activeDtBtn.classList.add('active','bg-sky-600','text-white'); activeDtBtn.classList.remove('text-slate-400'); } 
            document.getElementById(id).classList.add('active'); 
        }

        function openModal(id) { document.getElementById(id).classList.add('active'); } 
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        async function loadAll() {
            const { data: emps } = await window._sb.from('employees').select('*, branch_locations(branch_name)');
            const { data: brs } = await window._sb.from('branch_locations').select('*');
            window.allEmps = emps || []; window.branches = brs || [];

            const p = window.allEmps.filter(e => !e.is_approved && e.employment_status === '在職');
            document.getElementById('list-pend').innerHTML = p.length ? p.map(e => `<div class="glass-panel p-4 flex justify-between items-center"><div class="flex items-center"><span class="text-2xl mr-3">👤</span><div><h4 class="font-black text-sm text-slate-800">${e.full_name}</h4><p class="text-[10px] text-slate-500">${e.onboarding_date}</p></div></div><button onclick="appr('${e.id}')" class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-black px-4 py-2 rounded-lg transition">開通</button></div>`).join('') : '<p class="text-xs text-slate-400 font-bold text-center py-4">無待辦人員</p>';
            
            const aEmps = window.allEmps.filter(e => e.is_approved && e.employment_status === '在職');
            aEmps.sort((a, b) => { let valA = a.employee_no && a.employee_no !== '未設定' ? a.employee_no : 'Z999'; let valB = b.employee_no && b.employee_no !== '未設定' ? b.employee_no : 'Z999'; return valA.localeCompare(valB, 'zh-TW', { numeric: true }); });
            
            if (aEmps.length) {
                document.getElementById('list-emps-mobile').innerHTML = aEmps.map(e => {
                    let mgrTag = e.is_inventory_manager ? '<span class="text-[9px] bg-emerald-100 text-emerald-700 px-1 rounded ml-1">盤點員</span>' : '';
                    let pntTag = e.penalty_points > 0 ? `<span class="text-[9px] bg-red-100 text-red-700 px-1 rounded ml-1">計點:${e.penalty_points}</span>` : '';
                    return `<div class="glass-panel p-4 flex justify-between items-center"><div class="flex items-center"><div class="w-10 h-10 bg-slate-100 border border-slate-200 rounded-full flex items-center justify-center text-slate-500 font-black mr-3">${e.full_name.charAt(0)}</div><div><h4 class="font-black text-sm text-slate-800">${e.full_name} <span class="text-[9px] text-emerald-700 border border-emerald-200 bg-emerald-50 px-1 rounded">${(e.base_salary/1000).toFixed(0)}k</span>${mgrTag}${pntTag}</h4><p class="text-[10px] text-slate-500 mt-1">${e.employee_no||'未編號'} | ${e.branch_locations?.branch_name||'未綁定'}</p></div></div><button onclick="openEmpDetail('${e.id}')" class="bg-slate-800 text-white text-xs font-bold px-4 py-2 rounded-xl">管理</button></div>`;
                }).join('');
                document.getElementById('list-emps-desktop').innerHTML = aEmps.map(e => {
                    let mgrTag = e.is_inventory_manager ? '<span class="text-[9px] bg-emerald-100 text-emerald-700 px-1 rounded block mt-1 w-max">盤點負責人</span>' : '';
                    let pntTag = e.penalty_points > 0 ? `<span class="text-[9px] bg-red-100 text-red-700 px-1 rounded block mt-1 w-max">計點:${e.penalty_points}</span>` : '';
                    return `<tr class="hover:bg-slate-50 transition"><td class="px-6 py-4 font-black text-sky-700 text-xs">${e.employee_no||'--'}</td><td class="px-6 py-4 font-black text-slate-800">${e.full_name}${mgrTag}${pntTag}</td><td class="px-6 py-4 text-slate-600 font-mono text-xs">${e.phone}</td><td class="px-6 py-4 text-emerald-600 font-black">NT$ ${e.base_salary.toLocaleString()}</td><td class="px-6 py-4 text-center"><button onclick="openEmpDetail('${e.id}')" class="bg-slate-800 hover:bg-slate-700 text-white text-xs font-bold px-4 py-2 rounded-xl transition shadow-sm">管理</button></td></tr>`;
                }).join('');
            } else {
                document.getElementById('list-emps-mobile').innerHTML = '<p class="text-center text-xs text-slate-400 py-4">無在職員工</p>';
                document.getElementById('list-emps-desktop').innerHTML = '<tr><td colspan="5" class="text-center py-6 text-slate-400">無在職員工</td></tr>';
            }
        }

        // 🌟 核心修復：完整不壓縮的員工檢視面板
        function openEmpDetail(empId) { 
            const e = window.allEmps.find(x => x.id === empId); 
            if(!e) return; 
            
            window.currentOffboardEmpId = empId; 
            document.getElementById('modal-off-result').classList.add('hidden'); 
            document.getElementById('modal-off-date').value = ''; 
            document.getElementById('ui-emp-offboard-section').style.display = 'block'; 
            
            const editBtn = document.getElementById('btn-edit-emp'); 
            editBtn.onclick = () => renderEditEmpForm(empId); 
            editBtn.style.display = 'block';

        // 🌟 核心修復：完整不壓縮的編輯表單

                        <div><label class="text-[10px] font-bold text-slate-500 ml-1">身分證</label><input type="text" id="edit-idnum" value="${e.id_number}" class="admin-input bg-white uppercase" required></div>
                        <div class="col-span-2"><label class="text-[10px] font-bold text-slate-500 ml-1">職位</label><select id="edit-job-title" class="admin-input bg-white font-bold select-arrow"><option value="主管" ${e.job_title==='主管'?'selected':''}>主管</option><option value="業務" ${e.job_title==='業務'?'selected':''}>業務</option><option value="助理" ${e.job_title==='助理'?'selected':''}>助理</option></select></div>
                        
                        <div class="col-span-2 border-t border-sky-200 pt-3 mt-1">
                            <h5 class="text-[10px] font-black text-slate-700 mb-2">🔐 系統模組存取權限</h5>
                            <div class="grid grid-cols-4 gap-2 bg-white p-3 rounded-xl border border-slate-200 shadow-sm">
                                <label class="flex items-center space-x-1.5 cursor-pointer"><input type="checkbox" id="edit-perm-inv" class="w-4 h-4 accent-emerald-600" ${e.perm_inventory?'checked':''}> <span class="text-[11px] font-black text-slate-600">庫存</span></label>
                                <label class="flex items-center space-x-1.5 cursor-pointer"><input type="checkbox" id="edit-perm-pur" class="w-4 h-4 accent-amber-600" ${e.perm_purchase?'checked':''}> <span class="text-[11px] font-black text-slate-600">採購</span></label>
                                <label class="flex items-center space-x-1.5 cursor-pointer"><input type="checkbox" id="edit-perm-sal" class="w-4 h-4 accent-indigo-600" ${e.perm_sales?'checked':''}> <span class="text-[11px] font-black text-slate-600">業務</span></label>
                                <label class="flex items-center space-x-1.5 cursor-pointer"><input type="checkbox" id="edit-perm-fin" class="w-4 h-4 accent-blue-600" ${e.perm_finance?'checked':''}> <span class="text-[11px] font-black text-slate-600">財務</span></label>

                        </div>
                        
                        <div class="col-span-2 border-t border-sky-200 pt-3 mt-1">

                            </div>
                        </div>
                        
                        <div class="col-span-2 border-t border-sky-200 pt-3 mt-1">
                            <h5 class="text-[10px] font-black text-blue-700 mb-2">⏰ 考勤班別</h5>
                            <div class="grid grid-cols-2 gap-3">
                                <div><label class="text-[10px] font-bold text-slate-500 ml-1">上班時間</label><input type="time" id="edit-start-time" value="${(e.work_start_time||'09:00').slice(0,5)}" class="admin-input bg-white font-black text-blue-700" required></div>
                                <div><label class="text-[10px] font-bold text-slate-500 ml-1">下班時間</label><input type="time" id="edit-end-time" value="${(e.work_end_time||'18:00').slice(0,5)}" class="admin-input bg-white font-black text-blue-700" required></div>

                        <div><label class="text-[10px] font-bold text-emerald-600 ml-1">底薪</label><input type="number" id="edit-base" value="${e.base_salary}" class="admin-input bg-white font-black text-emerald-600" required></div>

            document.getElementById('ui-emp-full-info').innerHTML = html;

        async function saveEmpDetail(e, empId) { e.preventDefault(); const btn = document.getElementById('btn-save-emp'); const originText = btn.innerHTML; btn.innerHTML = '⏳ 儲存中...'; btn.disabled = true; let st = document.getElementById('edit-start-time').value; if(st && st.length === 5) st += ':00'; let et = document.getElementById('edit-end-time').value; if(et && et.length === 5) et += ':00'; const emp = window.allEmps.find(x => x.id === empId); const newPoints = parseInt(document.getElementById('edit-penalty').value) || 0; const pointsDiff = newPoints - (emp.penalty_points || 0); const p = { full_name: document.getElementById('edit-name').value, employment_status: document.getElementById('edit-status').value, employee_no: document.getElementById('edit-emp-no').value || '未設定', id_number: document.getElementById('edit-idnum').value, onboarding_date: document.getElementById('edit-onboard').value, job_title: document.getElementById('edit-job-title').value, work_start_time: st, work_end_time: et, base_salary: parseFloat(document.getElementById('edit-base').value) || 0, dependents_count: parseInt(document.getElementById('edit-deps').value) || 0, default_branch_id: document.getElementById('edit-branch').value, bank_name: document.getElementById('edit-bank-name').value, bank_code: document.getElementById('edit-bank-code').value, bank_user_name: document.getElementById('edit-bank-user').value, bank_account: document.getElementById('edit-bank-account').value, is_inventory_manager: document.getElementById('edit-inv-mgr').value === 'true', penalty_points: newPoints, perm_inventory: document.getElementById('edit-perm-inv').checked, perm_purchase: document.getElementById('edit-perm-pur').checked, perm_sales: document.getElementById('edit-perm-sal').checked, perm_finance: document.getElementById('edit-perm-fin').checked }; const { error } = await window._sb.from('employees').update(p).eq('id', empId); if (error) { alert('更新失敗: ' + error.message); btn.innerHTML = originText; btn.disabled = false; } else { if(pointsDiff !== 0) { await window._sb.from('penalty_logs').insert([{ employee_id: empId, points: pointsDiff, reason: '後台絕對值手動校正' }]); } btn.innerHTML = '✅ 完畢'; await loadAll(); setTimeout(() => openEmpDetail(empId), 500); } }
        
        async function calculateSettlement() { const empId = window.currentOffboardEmpId; const lastDay = document.getElementById('modal-off-date').value; const type = document.getElementById('modal-off-type').value; if(!empId || !lastDay) { alert('填寫最後工作日'); return; } const e = window.allEmps.find(x => x.id === empId); const { data: lv } = await window._sb.rpc('fn_get_annual_leave_v2', { p_emp_id: e.id }); const proRat = new Date(lastDay).getDate() / 30.0; const proSal = Math.round((proRat > 1 ? 1 : proRat) * e.base_salary); const uHrs = lv?.remain_hours || 0; const lPay = Math.round(uHrs * (e.base_salary / 240)); let sev = 0; if(type === '非自願離職(資遣)') { const ty = (new Date(lastDay).getTime() - new Date(e.onboarding_date).getTime()) / 31557600000; sev = Math.round(Math.max(0, ty) * 0.5 * e.base_salary); } const tot = proSal + lPay + sev; document.getElementById('res-base').innerText = e.base_salary; document.getElementById('res-pro').innerText = proSal; document.getElementById('res-lvp').innerText = lPay; document.getElementById('res-sev').innerText = sev; document.getElementById('res-total').innerText = tot; document.getElementById('modal-off-result').classList.remove('hidden'); globalOffboardData = { employee_id: empId, settlement_type: type, last_working_day: lastDay, base_salary_ref: e.base_salary, prorated_salary: proSal, unused_leave_hours: uHrs, unused_leave_pay: lPay, severance_pay: sev, total_settlement: tot }; }
        async function confirmOffboarding() { if(!globalOffboardData || !confirm('⚠️ 確定結算並停權？')) return; await window._sb.from('settlement_records').insert([globalOffboardData]); await window._sb.from('employees').update({ employment_status: '離職', is_approved: false, resignation_date: globalOffboardData.last_working_day }).eq('id', globalOffboardData.employee_id); alert('✅ 帳號已停權。'); closeModal('emp-detail-modal'); loadAll(); }
        
        window.onload = function() {
            if(localStorage.getItem('admin_logged')==='true') {
                document.getElementById('login-box').style.display='none'; 
                document.getElementById('dashboard-ui').classList.remove('hidden'); 
                document.getElementById('dashboard-ui').classList.add('flex');
                loadAll();
            }
        }
    </script>
