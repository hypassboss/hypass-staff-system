<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hypass | 財務對帳中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; }
        @media (max-width: 767px) { body { padding-bottom: 80px; } }
        @media (min-width: 768px) { body { background: #f8fafc; } }
        
        .view-panel { display: none; animation: fadeIn 0.3s ease; } .view-panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .glass-card { background: #ffffff; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05); border: 1px solid rgba(226, 232, 240, 0.8); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        @keyframes slideInLeft { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        .toast-msg { animation: slideInLeft 0.4s ease-out forwards; }
    </style>
</head>
<body class="text-slate-800 bg-slate-50 md:flex md:h-screen md:overflow-hidden relative w-full">

    <div id="toast-container" class="fixed bottom-24 md:bottom-10 left-1/2 transform -translate-x-1/2 z-[9999] flex flex-col space-y-3 pointer-events-none w-11/12 max-w-md"></div>

    <div id="loading-screen" class="fixed inset-0 bg-slate-900 z-[9999] flex flex-col items-center justify-center text-white transition-opacity duration-500">
        <div class="text-6xl mb-4 animate-bounce">💰</div>
        <h2 class="text-xl font-black tracking-widest mb-2">HYPASS 財務中心</h2>
        <p class="text-xs font-bold text-slate-400 tracking-wider">系統載入與權限驗證中...</p>
    </div>

    <aside class="hidden md:flex w-64 bg-slate-900 text-white flex-col h-full shadow-2xl shrink-0 z-20 overflow-y-auto no-scrollbar">
        <div class="p-6 pb-4 border-b border-slate-800 mb-4 sticky top-0 bg-slate-900 z-10">
            <h1 class="text-3xl font-black italic tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-300">HYPASS</h1>
            <span class="text-[10px] text-slate-400 tracking-[0.2em] uppercase font-bold mt-1 block">ERP Frontend</span>
        </div>
        <nav class="flex-1 px-4 space-y-2 pb-6">
            <button onclick="window.location.href='app_hr.html'" class="w-full text-left px-4 py-3.5 rounded-xl font-bold flex items-center transition text-slate-400 hover:text-white hover:bg-slate-800"><span class="mr-3 text-xl opacity-60">👨‍💼</span> 員工中心</button>
            <button onclick="window.location.href='app_inventory.html'" class="w-full text-left px-4 py-3.5 rounded-xl font-bold flex items-center transition text-slate-400 hover:text-white hover:bg-slate-800"><span class="mr-3 text-xl opacity-60">📦</span> 庫存大盤</button>
            <button onclick="window.location.href='app_purchase.html'" class="w-full text-left px-4 py-3.5 rounded-xl font-bold flex items-center transition text-slate-400 hover:text-white hover:bg-slate-800"><span class="mr-3 text-xl opacity-60">🛒</span> 採購中心</button>
            <button onclick="window.location.href='app_sales.html'" class="w-full text-left px-4 py-3.5 rounded-xl font-bold flex items-center transition text-slate-400 hover:text-white hover:bg-slate-800"><span class="mr-3 text-xl opacity-60">💼</span> 業務中心</button>
            <button onclick="window.location.href='app_finance.html'" class="w-full text-left px-4 py-3.5 rounded-xl font-bold flex items-center transition bg-blue-600 text-white shadow-md"><span class="mr-3 text-xl">💰</span> 財務中心</button>
            <div class="pt-4 mt-4 border-t border-slate-800"></div>
            <button onclick="window.location.href='admin.html'" class="w-full text-left px-4 py-3.5 rounded-xl font-bold flex items-center transition text-amber-500 hover:text-amber-400 hover:bg-slate-800 border border-slate-700"><span class="mr-3 text-xl">👑</span> 指揮中心 (老闆)</button>
        </nav>
        <div class="p-4 border-t border-slate-800 bg-slate-900/50 sticky bottom-0">
            <div class="text-[10px] text-slate-400 mb-1 px-2 font-bold tracking-widest">登入身分</div>
            <div id="desktop-user-badge" class="font-black text-blue-400 px-2 truncate">載入中...</div>
        </div>
    </aside>

    <div id="app-container" class="flex-1 flex-col h-full relative hidden overflow-y-auto md:overflow-y-hidden w-full max-w-full">
        
        <header class="md:hidden bg-slate-900 text-white px-4 py-3 shadow-md sticky top-0 z-50 flex items-center justify-between h-14 relative shrink-0">
            <button id="btn-back" class="hidden mr-2 bg-white/10 hover:bg-white/20 px-3 py-1.5 rounded-full text-xs font-bold transition shrink-0 flex items-center">🔙 返回</button>
            <div class="flex-1 min-w-0 flex justify-center text-center">
                <h1 class="text-base sm:text-lg font-black italic tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-300 truncate px-2" id="header-title">財務對帳中心</h1>
            </div>
            <div class="shrink-0 text-[10px] font-bold bg-white/10 px-2 py-1 rounded-full border border-white/20" id="user-badge">載入中</div>
        </header>

        <main class="flex-1 overflow-y-auto p-4 md:p-8 relative z-10 w-full flex items-center justify-center min-h-[70vh]">
            <div class="max-w-2xl w-full text-center">
                <div class="glass-card p-10 md:p-16 rounded-[3rem] shadow-xl border-t-8 border-blue-500 relative overflow-hidden">
                    <div class="absolute -left-10 -bottom-10 text-[150px] opacity-5">🏦</div>
                    <span class="text-6xl md:text-8xl mb-6 block drop-shadow-lg relative z-10">🔐</span>
                    <h2 class="text-2xl md:text-3xl font-black text-slate-800 tracking-wider mb-3 relative z-10">財務模組籌備中</h2>
                    <p class="text-sm md:text-base font-bold text-slate-500 leading-relaxed max-w-md mx-auto relative z-10">
                        為確保企業資金安全與報表精準度，對帳大盤與請款審核功能正在進行最後的資安強化。<br><br>敬請期待後續上線！
                    </p>
                </div>
            </div>
        </main>
    </div>

    <nav id="core-bottom-nav" class="md:hidden fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/95 backdrop-blur-md border-t border-slate-200 flex justify-around text-[10px] font-bold text-slate-400 pb-5 pt-2 z-[9990] shadow-[0_-4px_20px_rgba(0,0,0,0.05)]">
        <div onclick="event.stopPropagation(); window.location.href='app_hr.html'" class="flex-1 flex flex-col items-center py-1 cursor-pointer transition hover:text-sky-600"><span class="text-xl mb-1 opacity-60 grayscale">👨‍💼</span><span class="scale-90">員工</span></div>
        <div onclick="event.stopPropagation(); window.location.href='app_inventory.html'" class="flex-1 flex flex-col items-center py-1 cursor-pointer transition hover:text-emerald-600"><span class="text-xl mb-1 opacity-60 grayscale">📦</span><span class="scale-90">庫存</span></div>
        <div onclick="event.stopPropagation(); window.location.href='app_purchase.html'" class="flex-1 flex flex-col items-center py-1 cursor-pointer transition hover:text-amber-600"><span class="text-xl mb-1 opacity-60 grayscale">🛒</span><span class="scale-90">採購</span></div>
        <div onclick="event.stopPropagation(); window.location.href='app_sales.html'" class="flex-1 flex flex-col items-center py-1 cursor-pointer transition hover:text-indigo-600"><span class="text-xl mb-1 opacity-60 grayscale">💼</span><span class="scale-90">業務</span></div>
        <div onclick="event.stopPropagation(); window.location.href='app_finance.html'" class="flex-1 flex flex-col items-center py-1 cursor-pointer transition text-blue-600"><span class="text-xl mb-1">💰</span><span class="scale-90">財務</span></div>
    </nav>

    <script src="shared.js"></script>
    <script>
        async function bootFinance() {
            try {
                // 強制超時保護
                let authTimeout = setTimeout(() => {
                    const ls = document.getElementById('loading-screen');
                    if(ls) ls.innerHTML = '<div class="text-4xl mb-4">⚠️</div><h2 class="text-xl font-black text-white">載入超時</h2><p class="text-slate-400 mt-2">請檢查網路或重新登入</p><button onclick="window.location.href=\'index.html\'" class="mt-6 bg-white text-slate-900 px-6 py-2 rounded-full font-bold">重新登入</button>';
                }, 5000);

                const isAuth = await authGuard('finance'); 
                clearTimeout(authTimeout);

                if(!isAuth) {
                    const ls = document.getElementById('loading-screen');
                    if(ls) ls.innerHTML = '<div class="text-4xl mb-4">⛔</div><h2 class="text-xl font-black text-white">權限不足</h2><p class="text-slate-400 mt-2 text-center text-sm px-6">您尚未被授權「財務系統」權限。</p><button onclick="window.location.href=\'app_hr.html\'" class="mt-6 bg-blue-500 hover:bg-blue-400 text-white px-6 py-2 rounded-full font-black tracking-widest shadow-lg transition active:scale-95">返回員工大廳</button>';
                    return; 
                }

                document.getElementById('user-badge').innerText = window.currentUser?.full_name || '使用者'; 
                if(document.getElementById('desktop-user-badge')) {
                    document.getElementById('desktop-user-badge').innerText = window.currentUser?.full_name || '使用者'; 
                }
                
                document.getElementById('loading-screen').classList.add('opacity-0');
                setTimeout(() => { 
                    document.getElementById('loading-screen').style.display = 'none'; 
                    document.getElementById('app-container').classList.remove('hidden'); 
                    document.getElementById('app-container').classList.add('flex');
                }, 400);

            } catch(e) {
                console.error(e);
            }
        }

        window.onload = () => {
            bootFinance();
            const enforceNavObserver = new MutationObserver(() => { const oldNav = document.querySelector('nav:not(#core-bottom-nav)'); if (oldNav) oldNav.remove(); });
            enforceNavObserver.observe(document.body, { childList: true, subtree: true });
        }
    </script>
</body>
</html>
